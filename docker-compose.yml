version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:14-alpine
    container_name: bingxi-postgres
    environment:
      POSTGRES_DB: bingxi
      POSTGRES_USER: bingxi
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-bingxi123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bingxi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: bingxi-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: bingxi-backend
    environment:
      DATABASE__HOST: postgres
      DATABASE__PORT: 5432
      DATABASE__NAME: bingxi
      DATABASE__USERNAME: bingxi
      DATABASE__PASSWORD: ${DATABASE_PASSWORD:-bingxi123}
      JWT_SECRET: ${JWT_SECRET:-default_jwt_secret_at_least_32_bytes}
      COOKIE_SECRET: ${COOKIE_SECRET:-default_cookie_secret_at_least_32_bytes}
      AUDIT_SECRET_KEY: ${AUDIT_SECRET_KEY:-default_audit_secret_at_least_32_bytes}
      REDIS__URL: redis://redis:6379
    ports:
      - "8082:8082"
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/api/v1/erp/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: bingxi-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: