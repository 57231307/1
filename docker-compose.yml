version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bingxi-db
    environment:
      POSTGRES_USER: bingxi
      POSTGRES_PASSWORD: bingxi_password
      POSTGRES_DB: bingxi
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bingxi -d bingxi"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bingxi-backend
    environment:
      # Database Config
      - DATABASE__HOST=db
      - DATABASE__PORT=5432
      - DATABASE__USERNAME=bingxi
      - DATABASE_PASSWORD=bingxi_password
      - DATABASE__NAME=bingxi
      # Auth Config
      - JWT_SECRET=change-me-to-a-secure-secret-in-production-at-least-32-bytes
      - COOKIE_SECRET=change-me-to-a-secure-secret-in-production-at-least-32-bytes
      - AUDIT_SECRET_KEY=change-me-to-a-secure-secret-in-production-at-least-32-bytes
      # Server Config
      - SERVER__HOST=0.0.0.0
      - SERVER__PORT=8082
      - CORS__ALLOWED_ORIGINS=http://localhost,http://127.0.0.1,http://localhost:3000
      - GRPC__HOST=0.0.0.0
      - GRPC__PORT=50051
    ports:
      - "8082:8082"
      - "50051:50051"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/api/v1/erp/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bingxi-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
