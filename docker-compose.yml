version: '3.8'

services:
  # PostgreSQL 数据库
  db:
    image: postgres:15-alpine
    container_name: bingxi-db
    environment:
      POSTGRES_DB: bingxi
      POSTGRES_USER: bingxi
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bingxi123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bingxi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bingxi-backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: bingxi
      DB_USER: bingxi
      DB_PASSWORD: ${DB_PASSWORD:-bingxi123}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-here}
      COOKIE_SECRET: ${COOKIE_SECRET:-your-cookie-secret-here}
    ports:
      - "8082:8082"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: bingxi-nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
