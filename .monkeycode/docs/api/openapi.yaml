paths:
  # ═══════════════════════════════════════════════════════════════════
  # 认证模块
  # ═══════════════════════════════════════════════════════════════════
  /erp/auth/login:
    post:
      tags: [认证]
      summary: 用户登录
      description: 用户名密码登录，成功返回 JWT Token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '423':
          description: 账号被锁定
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /erp/auth/login/2fa:
    post:
      tags: [认证]
      summary: 二因素验证登录
      description: 用户名密码 + TOTP 双因素登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorLoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /erp/auth/logout:
    post:
      tags: [认证]
      summary: 用户登出
      description: 注销当前 Token
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /erp/auth/verify:
    get:
      tags: [认证]
      summary: 验证 Token 有效性
      responses:
        '200':
          description: Token 有效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /erp/auth/refresh:
    post:
      tags: [认证]
      summary: 刷新 Token
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'

  /erp/auth/change-password:
    post:
      tags: [认证]
      summary: 修改密码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: 修改成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  # ═══════════════════════════════════════════════════════════════════
  # 用户管理
  # ═══════════════════════════════════════════════════════════════════
  /erp/users:
    get:
      tags: [用户管理]
      summary: 获取用户列表
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: keyword
          in: query
          description: 关键字（用户名 / 姓名 / 邮箱）
          schema:
            type: string
        - name: department_id
          in: query
          schema:
            type: integer
        - name: role_id
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, locked]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserList'
    post:
      tags: [用户管理]
      summary: 创建用户
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /erp/users/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      tags: [用户管理]
      summary: 获取用户详情
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    put:
      tags: [用户管理]
      summary: 更新用户
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    delete:
      tags: [用户管理]
      summary: 删除用户
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /erp/users/{id}/reset-password:
    post:
      tags: [用户管理]
      summary: 重置用户密码
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: 重置成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /erp/users/{id}/unlock:
    post:
      tags: [用户管理]
      summary: 解锁用户
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: 解锁成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /erp/users/{id}/enable:
    post:
      tags: [用户管理]
      summary: 启用用户
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: 启用成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /erp/users/{id}/disable:
    post:
      tags: [用户管理]
      summary: 禁用用户
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: 禁用成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  # ═══════════════════════════════════════════════════════════════════
