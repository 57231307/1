openapi: 3.0.3
info:
  title: 冰溪 ERP API
  description: |
    冰溪 ERP 系统完整 OpenAPI 3.0 规范

    ## 项目概述
    冰溪 ERP 是面向面料 / 染整行业的全栈企业资源计划系统，
    覆盖销售、采购、库存、财务、生产、CRM、AI、BI 等核心业务域。

    ## 技术栈
    - 后端：Rust 1.94 + axum 0.7 + SeaORM 2.0-rc.40
    - 数据库：PostgreSQL 14+
    - 认证：Bearer Token (JWT) + TOTP 双因素

    ## API 规模
    - 端点数：850+
    - 业务域：19 个 routes 模块
    - 数据库表：213
    - 文档版本：v2026.617.0001

    ## 通用约定
    - 所有响应统一使用 `ApiResponse<T>` 包装（code / data / message）
    - 业务异常返回 `code >= 400` 的标准错误码
    - 多租户隔离：所有业务请求必须携带有效 JWT，租户 ID 从 token 提取
    - 时间格式：ISO 8601（`2026-06-17T03:30:00+08:00`）
    - 金额单位：元（DECIMAL(18,2)）
  version: 2026.617.0001
  contact:
    name: 冰溪 ERP Team
    url: https://github.com/57231307/1
    email: support@bingxi.com
  license:
    name: MIT
    url: https://github.com/57231307/1/blob/main/LICENSE

servers:
  - url: https://api.bingxi.com/v1
    description: 生产环境
  - url: https://staging-api.bingxi.com/v1
    description: 预发环境
  - url: http://localhost:8080/api/v1
    description: 本地开发

