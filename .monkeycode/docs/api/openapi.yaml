components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        使用 JWT Token 认证，格式：`Authorization: Bearer {token}`
        Token 中包含 user_id、tenant_id、role_ids 等信息
        有效期：2 小时，可通过 /erp/auth/refresh 刷新

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: 资源 ID
      schema:
        type: integer
        format: int64
        minimum: 1
    PageParam:
      name: page
      in: query
      description: 页码（从 1 开始）
      schema:
        type: integer
        default: 1
        minimum: 1
    PageSizeParam:
      name: page_size
      in: query
      description: 每页大小
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 200
    KeywordParam:
      name: keyword
      in: query
      description: 关键字搜索
      schema:
        type: string
    StartDateParam:
      name: start_date
      in: query
      description: 起始日期
      schema:
        type: string
        format: date
    EndDateParam:
      name: end_date
      in: query
      description: 结束日期
      schema:
        type: string
        format: date
    TenantIdParam:
      name: tenant_id
      in: query
      description: 租户 ID（平台级接口使用）
      schema:
        type: integer
    StatusParam:
      name: status
      in: query
      description: 状态
      schema:
        type: string
    SortByParam:
      name: sort_by
      in: query
      description: 排序字段
      schema:
        type: string
    SortOrderParam:
      name: sort_order
      in: query
      description: 排序方向
      schema:
        type: string
        enum: [asc, desc]
        default: asc

  responses:
    Unauthorized:
      description: 未认证
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    Forbidden:
      description: 无权限
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    ServerError:
      description: 服务器内部错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

  schemas:
    # ═══════════════════════════════════════════════════════════════════
    # 通用 schema
    # ═══════════════════════════════════════════════════════════════════
    ApiResponse:
      type: object
      description: 统一 API 响应包装
      required: [code, message]
      properties:
        code:
          type: integer
          description: 状态码（0 = 成功，>= 400 = 业务异常）
          example: 0
        message:
          type: string
          description: 提示信息
          example: 操作成功
        data:
          description: 业务数据
        timestamp:
          type: string
          format: date-time
        request_id:
          type: string
          description: 请求追踪 ID

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
          description: 总记录数
        page:
          type: integer
          description: 当前页码
        page_size:
          type: integer
          description: 每页大小
        total_pages:
          type: integer
          description: 总页数

    # ═══════════════════════════════════════════════════════════════════
    # 认证 / 用户
    # ═══════════════════════════════════════════════════════════════════
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        password:
          type: string
          minLength: 8
          maxLength: 128
          format: password
        tenant_code:
          type: string
          description: 租户编码（多租户场景）

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT 访问令牌
        refresh_token:
          type: string
          description: 刷新令牌
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: 过期时间（秒）
          example: 7200
        user:
          $ref: '#/components/schemas/User'
        permissions:
          type: array
          items:
            type: string
        roles:
          type: array
          items:
            type: string
        requires_totp:
          type: boolean
          description: 是否需要双因素验证
        totp_token:
          type: string
          description: 双因素验证临时令牌

    TwoFactorLoginRequest:
      type: object
      required: [totp_token, totp_code]
      properties:
        totp_token:
          type: string
        totp_code:
          type: string
          minLength: 6
          maxLength: 6

    ChangePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password:
          type: string
          format: password
        new_password:
          type: string
          format: password
          minLength: 8

    ResetPasswordRequest:
      type: object
      required: [new_password]
      properties:
        new_password:
          type: string
          format: password
          minLength: 8
        force_change:
          type: boolean
          default: true

    User:
      type: object
      properties:
        id:
          type: integer
        tenant_id:
          type: integer
        username:
          type: string
        email:
          type: string
          format: email
        real_name:
          type: string
        phone:
          type: string
        department_id:
          type: integer
        role_id:
          type: integer
        role_ids:
          type: array
          items:
            type: integer
        status:
          type: string
          enum: [active, inactive, locked]
        is_totp_enabled:
          type: boolean
        last_login_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserCreateRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        real_name:
          type: string
        phone:
          type: string
        department_id:
          type: integer
        role_ids:
          type: array
          items:
            type: integer

    UserUpdateRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        real_name:
          type: string
        phone:
          type: string
        department_id:
          type: integer
        role_ids:
          type: array
          items:
            type: integer
        status:
          type: string
          enum: [active, inactive, locked]

    UserList:
      type: object
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/User'
                meta:
                  $ref: '#/components/schemas/PaginationMeta'

    Role:
      type: object
      properties:
        id:
          type: integer
        tenant_id:
          type: integer
        code:
          type: string
        name:
          type: string
        description:
          type: string
        permission_ids:
          type: array
          items:
            type: integer
        is_system:
          type: boolean
        created_at:
          type: string
          format: date-time

    RoleCreateRequest:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
        permission_ids:
          type: array
          items:
            type: integer

    RoleUpdateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        permission_ids:
          type: array
          items:
            type: integer

    RoleList:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/Role'
                meta:
                  $ref: '#/components/schemas/PaginationMeta'

    Permission:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
          example: 'sales:order:read'
        name:
          type: string
        resource:
          type: string
          example: 'sales_order'
        action:
          type: string
          enum: [create, read, update, delete, export, import, approve]
        description:
          type: string

    PermissionCreateRequest:
      type: object
      required: [code, name, resource, action]
      properties:
        code:
          type: string
        name:
          type: string
        resource:
          type: string
        action:
          type: string
        description:
          type: string

    PermissionUpdateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    DataPermission:
      type: object
      properties:
        id:
          type: integer
        role_id:
          type: integer
        scope_type:
          type: string
          enum: [all, department, self, custom]
        scope_value:
          type: string
          description: 范围值（部门 ID / 用户 ID / 自定义 SQL）
        resource:
          type: string

    DataPermissionRequest:
      type: object
      required: [role_id, scope_type, resource]
      properties:
        role_id:
          type: integer
        scope_type:
          type: string
        scope_value:
          type: string
        resource:
          type: string

    FieldPermission:
      type: object
      properties:
        id:
          type: integer
        role_id:
          type: integer
        table_name:
          type: string
        field_name:
          type: string
        access_type:
          type: string
          enum: [read, write, hidden]

    FieldPermissionRequest:
      type: object
      required: [role_id, table_name, field_name, access_type]
      properties:
