# 冰溪 ERP 后端 Clippy 配置
#
# 死代码策略（CI 强制）：
# - 所有 crate 禁止使用 `#![allow(dead_code)]` 全局抑制；
# - 业务模块若个别 API 当前未被使用，应使用项级 `#[allow(dead_code)]` + TODO 注释，
#   并在后续接入业务时移除。
# - utils/ 等核心工具模块的 `#![allow(dead_code)]` 已全部移除，由编译器直接报告。
#
# rustc 标准 lint（dead_code / unused_imports / unused_variables）配置在
# backend/Cargo.toml 的 [lints.rust] 段（clippy 1.81+ 已弃用顶层 warn 数组）。

# 禁止使用 println!（除 CLI 工具外）
# 注意：path 不能带 std:: 前缀，否则 clippy 1.94 报"unknown method"警告（宏不是方法）
disallowed-methods = [
    { path = "println", reason = "使用 tracing::info! 替代" },
    { path = "eprintln", reason = "使用 tracing::error! 替代" },
]

# 强制使用 Result 处理错误
avoid-breaking-exported-api = true
