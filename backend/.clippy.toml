# 冰溪 ERP 后端 Clippy 配置
#
# 死代码策略（CI 强制）：
# - 所有 crate 禁止使用 `#![allow(dead_code)]` 全局抑制；
# - 业务模块若个别 API 当前未被使用，应使用项级 `#[allow(dead_code)]` + TODO 注释，
#   并在后续接入业务时移除。
# - utils/ 等核心工具模块的 `#![allow(dead_code)]` 已全部移除，由编译器直接报告。
#
# rustc 标准 lint（dead_code / unused_imports / unused_variables）配置在
# backend/Cargo.toml 的 [lints.rust] 段（clippy 1.81+ 已弃用顶层 warn 数组）。

# 强制使用 Result 处理错误
avoid-breaking-exported-api = true

# 注意：原先配置了 disallowed-methods 来禁止 println!/eprintln!，
# 但这两个是宏而非方法，clippy 1.94 会报 "does not refer to a reachable function" 警告。
# 改用 disallowed-macros 会触发 100+ 处 CLI 工具合法使用的新警告（CLI 输出需要 println!）。
# 因此移除此配置，改为在代码审查中手动约束非 CLI 代码不使用 println!/eprintln!。
