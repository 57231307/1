# 秉羲面料管理 - 本地开发配置文件
#
# 安全警告：此文件仅用于开发环境，生产环境请使用环境变量覆盖敏感配置
# 环境变量优先级高于此文件，生产环境必须设置以下环境变量：
#   - DATABASE_PASSWORD (数据库密码)
#   - JWT_SECRET (JWT 密钥，至少 32 字节)
#   - COOKIE_SECRET (Cookie 密钥，至少 32 字节)
#   - AUDIT_SECRET_KEY (审计密钥，至少 32 字节)
# 生成方法: openssl rand -base64 32

server:
  host: "127.0.0.1"
  port: "8082"

database:
  connection_string: "postgres://bingxi:bingxi123@localhost:5432/bingxi"
  host: "localhost"
  port: 5432
  name: "bingxi"
  username: "bingxi"
  # ⚠️ 安全警告：生产环境必须通过环境变量 DATABASE_PASSWORD 设置
  password: "bingxi123"
  max_connections: 50
  min_connections: 5
  acquire_timeout_ms: 30000
  idle_timeout_ms: 300000
  max_lifetime_ms: 1800000
  ssl_mode: "disable"
  ssl_ca: null

auth:
  # ⚠️ 安全警告：生产环境必须通过环境变量 JWT_SECRET 设置至少 32 字节的强随机密钥
  jwt_secret: "A8/JFcyFN27CcKSwGK2PnJeuIwMso+KE0UW+aq+ffww="
  # ⚠️ 安全警告：生产环境必须通过环境变量 COOKIE_SECRET 设置至少 32 字节的强随机密钥
  cookie_secret: "fHPI3zurmq6s9WGLeOFunfEUjg0HDdWwwzvRXspqahU="
  token_expiry_hours: 24

grpc:
  host: "127.0.0.1"
  port: 50051

log:
  # ⚠️ 生产环境建议设置为 info 或 warn
  level: "info"
  dir: "./logs"

cors:
  # ⚠️ 生产环境必须配置实际域名，移除所有 localhost
  # 注意：以下字段全部支持 serde(default) 兜底，缺失时自动使用代码中的默认值
  allowed_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"
    - "https://3000-6e8e9218ecb12940.monkeycode-ai.online"
    - "http://111.230.99.236"
    - "https://111.230.99.236"
  allow_credentials: true
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Content-Type"
    - "Authorization"
    - "X-Requested-With"
    - "Cookie"
    - "Accept"
  max_age_secs: 3600

redis:
  url: "redis://127.0.0.1:6379"
  max_connections: 10

env: "development"