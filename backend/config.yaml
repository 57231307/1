# 秉羲面料管理 - 本地开发配置文件
#
# 安全警告：此文件仅用于开发环境，生产环境请使用环境变量覆盖敏感配置
# 环境变量优先级高于此文件，生产环境必须设置以下环境变量：
#   - DATABASE_PASSWORD (数据库密码)
#   - JWT_SECRET (JWT 密钥，至少 32 字节)
#   - COOKIE_SECRET (Cookie 密钥，至少 32 字节)
#   - AUDIT_SECRET_KEY (审计密钥，至少 32 字节)
# 生成方法: openssl rand -base64 32

server:
  host: "127.0.0.1"
  port: "8082"

database:
  # 生产环境必须通过环境变量 DATABASE_PASSWORD 提供真实密码
  # 开发环境请使用本地 .env 文件覆盖（DATABASE_URL 或 DATABASE_PASSWORD）
  # config crate 不支持 YAML 环境变量插值，此处保留 CHANGE_ME_IN_PRODUCTION 占位
  # 启动时由 DATABASE_URL 环境变量覆盖整串，或由 DATABASE_PASSWORD 覆盖 password 字段
  connection_string: "postgres://bingxi:CHANGE_ME_IN_PRODUCTION@localhost:5432/bingxi"
  host: "localhost"
  port: 5432
  name: "bingxi"
  username: "bingxi"
  # 生产环境必须通过环境变量 DATABASE_PASSWORD 设置
  password: "${DATABASE_PASSWORD}"
  max_connections: 50
  min_connections: 5
  acquire_timeout_ms: 30000
  idle_timeout_ms: 300000
  max_lifetime_ms: 1800000
  # v5 审计批次 21：ssl_mode 由 disable 改为 prefer
  # 选择依据：prefer 先尝试 SSL，失败回退明文，比 disable 更安全；
  # 生产环境推荐 require（强制 SSL，失败即拒绝），prefer 作为更安全的默认值。
  ssl_mode: "prefer"
  ssl_ca: null

auth:
  # 生产环境必须通过环境变量 JWT_SECRET 设置（至少32字节随机值）
  jwt_secret: "${JWT_SECRET}"
  # 生产环境必须通过环境变量 COOKIE_SECRET 设置（至少32字节随机值）
  cookie_secret: "${COOKIE_SECRET}"
  token_expiry_hours: 24

grpc:
  host: "127.0.0.1"
  port: 50051

log:
  # ⚠️ 生产环境建议设置为 info 或 warn
  level: "info"
  dir: "./logs"

cors:
  # ⚠️ 生产环境必须配置实际域名，移除所有 localhost
  # 注意：以下字段全部支持 serde(default) 兜底，缺失时自动使用代码中的默认值
  allowed_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"
    - "https://3000-6e8e9218ecb12940.monkeycode-ai.online"
    - "http://111.230.99.236"
    - "https://111.230.99.236"
  allow_credentials: true
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Content-Type"
    - "Authorization"
    - "X-Requested-With"
    - "Cookie"
    - "Accept"
  max_age_secs: 3600

redis:
  url: "redis://127.0.0.1:6379"
  max_connections: 10

# 事件总线配置（Kafka 可选后端，P11-H2 引入）
# - 默认 enabled=false：进程内 tokio::sync::broadcast，CI 环境无 Kafka 也能启动
# - 生产环境设置 KAFKA_ENABLED=true 启用真实跨服务后端
kafka:
  enabled: false
  brokers: "localhost:9092"
  topic: "erp_business_events"
  consumer_group: "erp_event_consumer"
  client_id: "bingxi-erp"
  partitions: 12
  replication_factor: 1
  connect_timeout_ms: 5000
  auto_create_topic: true

env: "development"