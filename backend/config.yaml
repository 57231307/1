# 秉羲面料管理 - 本地开发配置文件
#
# 安全警告：此文件仅用于开发环境，生产环境请使用环境变量或密钥管理服务
# 敏感信息（密码、密钥）应从环境变量读取，不要在此文件中硬编码

server:
  host: "127.0.0.1"
  port: "8082"

database:
  # 生产环境：从环境变量读取 DATABASE_URL
  # 开发环境：使用本地数据库
  connection_string: "${DATABASE_URL:-postgres://bingxi:bingxi@localhost:5432/bingxi}"
  host: "${DB_HOST:-localhost}"
  port: "${DB_PORT:-5432}"
  name: "${DB_NAME:-bingxi}"
  username: "${DB_USER:-bingxi}"
  password: "${DB_PASSWORD:-bingxi}"
  max_connections: 50
  min_connections: 5
  acquire_timeout_ms: 30000
  idle_timeout_ms: 300000
  max_lifetime_ms: 1800000
  ssl_mode: "${DB_SSL_MODE:-disable}"
  ssl_ca: null

auth:
  # 生产环境：从环境变量读取 JWT_SECRET 和 COOKIE_SECRET
  # 生成方法: openssl rand -base64 32
  jwt_secret: "${JWT_SECRET:-local-dev-secret-key-for-test-environments-only-32-bytes}"
  cookie_secret: "${COOKIE_SECRET:-local-dev-cookie-secret-key-must-be-at-least-32-bytes-long}"
  token_expiry_hours: 24

grpc:
  host: "127.0.0.1"
  port: 50051

log:
  level: "debug"
  dir: "./logs"

cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"
    - "http://localhost:8080"
    - "http://127.0.0.1:8080"

env: "development"