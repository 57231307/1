# 秉羲面料管理 - 本地开发配置文件
#
# 安全警告：此文件仅用于开发环境，生产环境请使用环境变量覆盖敏感配置
# 环境变量优先级高于此文件，生产环境必须设置以下环境变量：
#   - DATABASE_PASSWORD (数据库密码)
#   - JWT_SECRET (JWT 密钥，至少 32 字节)
#   - COOKIE_SECRET (Cookie 密钥，至少 32 字节)
#   - AUDIT_SECRET_KEY (审计密钥，至少 32 字节)
# 生成方法: openssl rand -base64 32

server:
  host: "127.0.0.1"
  port: "8082"

database:
  connection_string: ""
  host: "localhost"
  port: 5432
  name: "bingxi"
  username: "bingxi"
  password: "bingxi"
  max_connections: 50
  min_connections: 5
  acquire_timeout_ms: 30000
  idle_timeout_ms: 300000
  max_lifetime_ms: 1800000
  ssl_mode: "disable"
  ssl_ca: null

auth:
  jwt_secret: "local-dev-secret-key-for-test-environments-only-32-bytes"
  cookie_secret: "local-dev-cookie-secret-key-must-be-at-least-32-bytes-long"
  token_expiry_hours: 24

grpc:
  host: "127.0.0.1"
  port: 50051

log:
  level: "debug"
  dir: "./logs"

cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"
    - "http://localhost:8080"
    - "http://127.0.0.1:8080"

security:
  jwt_secret: "${JWT_SECRET}"
  audit_secret: "${AUDIT_SECRET_KEY}"
  cors_allowed_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"

env: "development"