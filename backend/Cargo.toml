[package]
name = "bingxi-backend"
version = "1.0.0"
edition = "2021"
authors = ["BingXi Team"]
description = "秉羲管理系统 - Rust 后端服务"

[dependencies]
# Web 框架
axum = { version = "0.7", features = ["json", "multipart", "macros"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace", "fs"] }
http = "1"
http-body = "1"

# 异步运行时
tokio = { version = "1.0", features = ["full"] }

# 数据库
sea-orm = { version = "1.0", features = ["sqlx-postgres", "runtime-tokio", "macros"] }

# 序列化
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# 认证与安全
argon2 = "0.5"
base64 = "0.22"
uuid = { version = "1.0", default-features = false, features = ["serde", "v4"] }
hmac = "0.12"
sha2 = "0.10"

# 验证
validator = { version = "0.16", features = ["derive"] }
regex = "1.10"

# 配置
config = "0.14"
dotenvy = "0.15"

# 日志
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"

# 时间 - 纯Rust实现
chrono = { version = "0.4", default-features = false, features = ["std", "clock", "serde"] }

# 小数处理
rust_decimal = { version = "1.0", features = ["serde"] }

# gRPC
tonic = "0.12"
prost = "0.13"
tokio-stream = "0.1"

# 错误处理
thiserror = "1.0"
anyhow = "1.0"

# HTTP 客户端
reqwest = { version = "0.12", features = ["json"] }

# ZIP 压缩
zip = "2.2"

# 监控
prometheus = "0.13"

# 并发数据结构
dashmap = "5.5"

# Excel 处理 - 使用纯Rust库
rust_xlsxwriter = "0.58"

# 其他
once_cell = "1.19"
futures = "0.3"
async-trait = "0.1"

# 额外工具
arc-swap = "1.6"
axum-extra = { version = "0.9", features = ["typed-header"] }

# API 文档
utoipa = { version = "^5", features = ["axum_extras"] }
utoipa-swagger-ui = { version = "^6", features = ["axum"] }

[dev-dependencies]
tokio-test = "0.4"
mockall = "0.12"
sea-orm = { version = "1.0", features = ["sqlx-sqlite", "runtime-tokio"] }

[build-dependencies]
tonic-build = "0.12"

[[bin]]
name = "server"
path = "src/main.rs"

[profile.release]
# 优化配置 - 适配服务器1.9GB内存限制
lto = "thin"          # 使用thin LTO减少内存消耗，比full LTO节省约50%内存
codegen-units = 4      # 适度并行代码生成，减少内存压力
opt-level = 3          # 最高优化级别
strip = true           # 去除调试信息
