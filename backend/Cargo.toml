[package]
name = "bingxi-backend"
version = "1.0.0"
edition = "2021"
authors = ["BingXi Team"]
description = "秉羲管理系统 - Rust 后端服务"

[dependencies]
# Web 框架
axum = { version = "0.7", features = ["json", "multipart", "macros"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace", "fs", "set-header"] }
http = "1"

# 异步运行时
tokio = { version = "1.0", features = ["full"] }

# 数据库
sea-orm = { version = "1.0", features = ["sqlx-postgres", "runtime-tokio", "macros"] }
sqlx = { version = "0.8", features = ["postgres", "runtime-tokio", "chrono", "uuid", "json", "macros", "tls-rustls"] }

# 序列化
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# 认证与安全
argon2 = { version = "0.5", features = ["password-hash", "std"] }
uuid = { version = "1.0", default-features = false, features = ["serde", "v4"] }
jsonwebtoken = "9.0"

# 验证
validator = { version = "0.16", features = ["derive"] }
regex = "1.10"

# 配置
config = "0.14"

# 日志
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"

# 时间 - 纯Rust实现
chrono = { version = "0.4", default-features = false, features = ["std", "clock", "serde"] }

# 小数处理
rust_decimal = { version = "1.0", features = ["serde"] }

# gRPC
tonic = "0.12"
prost = "0.13" # kept just in case for tonic
tokio-stream = "0.1"

# 错误处理
thiserror = "1.0"
anyhow = "1.0"

# HTTP 客户端
reqwest = { version = "0.12", features = ["json"] }

# ZIP 压缩
zip = "2.2"

# 监控
prometheus = "0.13"

# 并发数据结构
dashmap = "5.5"

# 其他
once_cell = "1.19"
futures = "0.3"

# 额外工具
arc-swap = "1.6"

# API 文档
utoipa = { version = "^5", features = ["axum_extras"] }
url = "2.5.8"
urlencoding = "2.1.3"
fastrand = "2.4.0"
dotenvy = "0.15.7"

[dev-dependencies]
tokio-test = "0.4"
mockall = "0.12"
sea-orm = { version = "1.0", features = ["sqlx-sqlite", "runtime-tokio"] }

[build-dependencies]
tonic-build = "0.12"

[[bin]]
name = "server"
path = "src/main.rs"

[profile.dev]
opt-level = 0
debug = false
codegen-units = 16

[profile.release]
opt-level = 2
lto = false
codegen-units = 1
debug = false
strip = true

# 针对所有第三方依赖包使用更快的编译设置
[profile.release.package."*"]
opt-level = 2

# 针对构建脚本和过程宏禁用优化，以最快速度完成宏展开
[profile.release.build-override]
opt-level = 0

[profile.test]
opt-level = 0
debug = false
codegen-units = 16
lto = false
