// ===================== 固定资产服务 =====================
service FixedAssetService {
  rpc ListAssets(ListFixedAssetsRequest) returns (ListFixedAssetsResponse);
  rpc GetAsset(GetFixedAssetRequest) returns (GetFixedAssetResponse);
  rpc CreateAsset(CreateFixedAssetRequest) returns (CreateFixedAssetResponse);
  rpc DepreciateAsset(DepreciateFixedAssetRequest) returns (DepreciateFixedAssetResponse);
  rpc DisposeAsset(DisposeFixedAssetRequest) returns (DisposeFixedAssetResponse);
  rpc DeleteAsset(DeleteFixedAssetRequest) returns (DeleteFixedAssetResponse);
}

message FixedAsset {
  int32 id = 1;
  string asset_no = 2;
  string asset_name = 3;
  string asset_category = 4;
  string specification = 5;
  string model = 6;
  int32 use_department_id = 7;
  string use_location = 8;
  int32 responsible_person_id = 9;
  string original_value = 10;
  string salvage_value = 11;
  string salvage_rate = 12;
  string depreciable_value = 13;
  string depreciation_method = 14;
  int32 useful_life = 15;
  string monthly_depreciation = 16;
  string accumulated_depreciation = 17;
  string net_value = 18;
  string status = 19;
  string purchase_date = 20;
  string in_service_date = 21;
  string disposal_date = 22;
  int32 supplier_id = 23;
  string supplier_name = 24;
  int32 created_by = 25;
  int64 created_at = 26;
  int64 updated_at = 27;
}

message ListFixedAssetsRequest {
  string keyword = 1;
  string status = 2;
  string asset_category = 3;
  int32 page = 4;
  int32 page_size = 5;
}

message ListFixedAssetsResponse {
  bool success = 1;
  string message = 2;
  repeated FixedAsset assets = 3;
  int32 total = 4;
}

message GetFixedAssetRequest {
  int32 asset_id = 1;
}

message GetFixedAssetResponse {
  bool success = 1;
  string message = 2;
  FixedAsset asset = 3;
}

message CreateFixedAssetRequest {
  string asset_no = 1;
  string asset_name = 2;
  string asset_category = 3;
  string specification = 4;
  string location = 5;
  string original_value = 6;
  int32 useful_life = 7;
  string depreciation_method = 8;
  string purchase_date = 9;
  string put_in_date = 10;
  int32 supplier_id = 11;
  string remark = 12;
}

message CreateFixedAssetResponse {
  bool success = 1;
  string message = 2;
  FixedAsset asset = 3;
}

message DepreciateFixedAssetRequest {
  int32 asset_id = 1;
  string period = 2;
}

message DepreciateFixedAssetResponse {
  bool success = 1;
  string message = 2;
}

message DisposeFixedAssetRequest {
  int32 asset_id = 1;
  string disposal_type = 2;
  string disposal_value = 3;
  string disposal_date = 4;
  string reason = 5;
  string buyer_info = 6;
}

message DisposeFixedAssetResponse {
  bool success = 1;
  string message = 2;
}

message DeleteFixedAssetRequest {
  int32 asset_id = 1;
}

message DeleteFixedAssetResponse {
  bool success = 1;
  string message = 2;
}

// ===================== 预算管理服务 =====================
service BudgetManagementService {
  rpc ListItems(ListBudgetItemsRequest) returns (ListBudgetItemsResponse);
  rpc GetItem(GetBudgetItemRequest) returns (GetBudgetItemResponse);
  rpc CreateItem(CreateBudgetItemRequest) returns (CreateBudgetItemResponse);
  rpc UpdateItem(UpdateBudgetItemRequest) returns (UpdateBudgetItemResponse);
  rpc DeleteItem(DeleteBudgetItemRequest) returns (DeleteBudgetItemResponse);
  rpc ListPlans(ListBudgetPlansRequest) returns (ListBudgetPlansResponse);
  rpc GetPlan(GetBudgetPlanRequest) returns (GetBudgetPlanResponse);
  rpc CreatePlan(CreateBudgetPlanRequest) returns (CreateBudgetPlanResponse);
  rpc ApprovePlan(ApproveBudgetPlanRequest) returns (ApproveBudgetPlanResponse);
  rpc ExecutePlan(ExecuteBudgetPlanRequest) returns (ExecuteBudgetPlanResponse);
}

message BudgetItem {
  int32 id = 1;
  string item_code = 2;
  string item_name = 3;
  int32 parent_id = 4;
  string item_type = 5;
  int32 level = 6;
  string status = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
}

message ListBudgetItemsRequest {
  string item_type = 1;
  string status = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message ListBudgetItemsResponse {
  bool success = 1;
  string message = 2;
  repeated BudgetItem items = 3;
  int32 total = 4;
}

message GetBudgetItemRequest {
  int32 item_id = 1;
}

message GetBudgetItemResponse {
  bool success = 1;
  string message = 2;
  BudgetItem item = 3;
}

message CreateBudgetItemRequest {
  string item_code = 1;
  string item_name = 2;
  string item_type = 3;
  int32 parent_id = 4;
  int32 level = 5;
}

message CreateBudgetItemResponse {
  bool success = 1;
  string message = 2;
  BudgetItem item = 3;
}

message UpdateBudgetItemRequest {
  int32 item_id = 1;
  string item_name = 2;
  string item_type = 3;
  string status = 4;
}

message UpdateBudgetItemResponse {
  bool success = 1;
  string message = 2;
  BudgetItem item = 3;
}

message DeleteBudgetItemRequest {
  int32 item_id = 1;
}

message DeleteBudgetItemResponse {
  bool success = 1;
  string message = 2;
}

message BudgetPlan {
  int32 id = 1;
  string plan_no = 2;
  string plan_name = 3;
  int32 budget_year = 4;
  int32 department_id = 5;
  string total_amount = 6;
  string start_date = 7;
  string end_date = 8;
  string status = 9;
  int32 created_by = 10;
  int64 created_at = 11;
  int64 updated_at = 12;
}

message ListBudgetPlansRequest {
  int32 budget_year = 1;
  string status = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message ListBudgetPlansResponse {
  bool success = 1;
  string message = 2;
  repeated BudgetPlan plans = 3;
  int32 total = 4;
}

message GetBudgetPlanRequest {
  int32 plan_id = 1;
}

message GetBudgetPlanResponse {
  bool success = 1;
  string message = 2;
  BudgetPlan plan = 3;
}

message CreateBudgetPlanRequest {
  string plan_no = 1;
  string plan_name = 2;
  int32 budget_year = 3;
  int32 department_id = 4;
  string total_amount = 5;
  string start_date = 6;
  string end_date = 7;
  string remark = 8;
}

message CreateBudgetPlanResponse {
  bool success = 1;
  string message = 2;
  BudgetPlan plan = 3;
}

message ApproveBudgetPlanRequest {
  int32 plan_id = 1;
  string approval_comment = 2;
}

message ApproveBudgetPlanResponse {
  bool success = 1;
  string message = 2;
}

message ExecuteBudgetPlanRequest {
  int32 plan_id = 1;
  string actual_amount = 2;
  string expense_type = 3;
  string expense_date = 4;
  string remark = 5;
}

message ExecuteBudgetPlanResponse {
  bool success = 1;
  string message = 2;
}
