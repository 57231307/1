  string evaluation_date = 9;
  string remark = 10;
  int64 created_at = 11;
}

message CreateEvaluationRecordRequest {
  int32 supplier_id = 1;
  string evaluation_period = 2;
  int32 indicator_id = 3;
  string score = 4;
  string remark = 5;
}

message CreateEvaluationRecordResponse {
  bool success = 1;
  string message = 2;
