// ===================== 辅助核算服务 =====================
service AssistAccountingService {
  // 初始化辅助核算维度
  rpc InitializeDimensions(InitializeDimensionsRequest) returns (InitializeDimensionsResponse);
  // 创建辅助核算记录
  rpc CreateAssistRecord(CreateAssistRecordRequest) returns (CreateAssistRecordResponse);
  // 按业务查询辅助核算记录
  rpc FindByBusiness(FindByBusinessRequest) returns (FindByBusinessResponse);
  // 按五维查询辅助核算记录
  rpc FindByFiveDimension(FindByFiveDimensionRequest) returns (FindByFiveDimensionResponse);
  // 生成月度汇总
  rpc GenerateMonthlySummary(GenerateMonthlySummaryRequest) returns (GenerateMonthlySummaryResponse);
  // 查询辅助核算明细
  rpc QueryAssistRecords(QueryAssistRecordsRequest) returns (QueryAssistRecordsResponse);
  // 删除辅助核算记录
  rpc DeleteAssistRecord(DeleteAssistRecordRequest) returns (DeleteAssistRecordResponse);
  // 查询所有启用的维度
  rpc ListDimensions(ListDimensionsRequest) returns (ListDimensionsResponse);
}

message InitializeDimensionsRequest {}

message InitializeDimensionsResponse {
  bool success = 1;
  string message = 2;
}

message AssistAccountingRecord {
  int32 id = 1;
  string business_type = 2;
  string business_no = 3;
  int32 business_id = 4;
  int32 account_subject_id = 5;
  string debit_amount = 6;
  string credit_amount = 7;
  string five_dimension_id = 8;
  int32 product_id = 9;
  string batch_no = 10;
  string color_no = 11;
  string dye_lot_no = 12;
  string grade = 13;
  int32 warehouse_id = 14;
  string quantity_meters = 15;
  string quantity_kg = 16;
  int32 workshop_id = 17;
  int32 customer_id = 18;
  int32 supplier_id = 19;
  string remarks = 20;
  int64 created_at = 21;
  int32 created_by = 22;
}

message CreateAssistRecordRequest {
  string business_type = 1;
  string business_no = 2;
  int32 business_id = 3;
  int32 account_subject_id = 4;
  string debit_amount = 5;
  string credit_amount = 6;
  string five_dimension_id = 7;
  int32 product_id = 8;
  string batch_no = 9;
  string color_no = 10;
  string dye_lot_no = 11;
  string grade = 12;
  int32 warehouse_id = 13;
  string quantity_meters = 14;
  string quantity_kg = 15;
  int32 workshop_id = 16;
  int32 customer_id = 17;
  int32 supplier_id = 18;
  string remarks = 19;
  int32 created_by = 20;
}

message CreateAssistRecordResponse {
  bool success = 1;
  string message = 2;
  AssistAccountingRecord record = 3;
}

message FindByBusinessRequest {
  string business_type = 1;
  string business_no = 2;
}

message FindByBusinessResponse {
  bool success = 1;
  string message = 2;
  repeated AssistAccountingRecord records = 3;
}

message FindByFiveDimensionRequest {
  string five_dimension_id = 1;
}

message FindByFiveDimensionResponse {
  bool success = 1;
  string message = 2;
  repeated AssistAccountingRecord records = 3;
}

message GenerateMonthlySummaryRequest {
  int32 year = 1;
  int32 month = 2;
}

message GenerateMonthlySummaryResponse {
  bool success = 1;
  string message = 2;
}

message QueryAssistRecordsRequest {
  string accounting_period = 1;
  string dimension_code = 2;
  string business_type = 3;
  int32 warehouse_id = 4;
  int32 page = 5;
  int32 page_size = 6;
}

message QueryAssistRecordsResponse {
  bool success = 1;
  string message = 2;
  repeated AssistAccountingRecord records = 3;
  int32 total = 4;
}

message DeleteAssistRecordRequest {
  int32 record_id = 1;
}

message DeleteAssistRecordResponse {
  bool success = 1;
  string message = 2;
}

message AssistAccountingDimension {
  int32 id = 1;
  string dimension_code = 2;
  string dimension_name = 3;
  string description = 4;
  bool is_active = 5;
  int32 sort_order = 6;
  int64 created_at = 7;
  int64 updated_at = 8;
}

message ListDimensionsRequest {}

message ListDimensionsResponse {
  bool success = 1;
  string message = 2;
  repeated AssistAccountingDimension dimensions = 3;
}

// ===================== 供应商评估服务 =====================
service SupplierEvaluationService {
  // 获取评估指标列表
  rpc GetIndicatorsList(GetIndicatorsListRequest) returns (GetIndicatorsListResponse);
  // 创建评估指标
  rpc CreateIndicator(CreateIndicatorRequest) returns (CreateIndicatorResponse);
  // 创建评估记录
  rpc CreateEvaluationRecord(CreateEvaluationRecordRequest) returns (CreateEvaluationRecordResponse);
  // 获取供应商评分
  rpc GetSupplierScore(GetSupplierScoreRequest) returns (GetSupplierScoreResponse);
  // 查询供应商评级列表
  rpc ListRatings(ListRatingsRequest) returns (ListRatingsResponse);
  // 查询供应商排名榜
  rpc GetSupplierRankings(GetSupplierRankingsRequest) returns (GetSupplierRankingsResponse);
  // 获取评估记录列表
  rpc GetEvaluationRecords(GetEvaluationRecordsRequest) returns (GetEvaluationRecordsResponse);
  // 获取评估记录详情
  rpc GetEvaluationRecordById(GetEvaluationRecordByIdRequest) returns (GetEvaluationRecordByIdResponse);
}

