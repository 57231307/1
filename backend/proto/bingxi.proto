}

// ===================== 库存预留服务 =====================
service InventoryReservationService {
  // 创建库存预留
  rpc CreateReservation(CreateReservationRequest) returns (CreateReservationResponse);
  // 锁定预留
  rpc LockReservation(LockReservationRequest) returns (LockReservationResponse);
  // 释放预留
  rpc ReleaseReservation(ReleaseReservationRequest) returns (ReleaseReservationResponse);
  // 使用预留
  rpc UseReservation(UseReservationRequest) returns (UseReservationResponse);
  // 根据订单获取预留
  rpc GetReservationsByOrder(GetReservationsByOrderRequest) returns (GetReservationsByOrderResponse);
  // 根据订单获取已锁定的预留
  rpc GetLockedReservationsByOrder(GetLockedReservationsByOrderRequest) returns (GetLockedReservationsByOrderResponse);
  // 批量创建预留
  rpc BatchCreateReservations(BatchCreateReservationsRequest) returns (BatchCreateReservationsResponse);
  // 批量锁定预留
  rpc BatchLockReservations(BatchLockReservationsRequest) returns (BatchLockReservationsResponse);
  // 批量释放预留
  rpc BatchReleaseReservations(BatchReleaseReservationsRequest) returns (BatchReleaseReservationsResponse);
}

message InventoryReservation {
  int32 id = 1;
  int32 order_id = 2;
  int32 product_id = 3;
  int32 warehouse_id = 4;
  string quantity = 5;
  string status = 6;
  int64 reserved_at = 7;
  int64 released_at = 8;
  string notes = 9;
  int32 created_by = 10;
  int64 created_at = 11;
  int64 updated_at = 12;
}

message CreateReservationRequest {
  int32 order_id = 1;
  int32 product_id = 2;
  int32 warehouse_id = 3;
  string quantity = 4;
  int32 created_by = 5;
  string notes = 6;
}

message CreateReservationResponse {
  bool success = 1;
  string message = 2;
  InventoryReservation reservation = 3;
}

message LockReservationRequest {
  int32 reservation_id = 1;
}

message LockReservationResponse {
  bool success = 1;
  string message = 2;
  InventoryReservation reservation = 3;
}

message ReleaseReservationRequest {
  int32 reservation_id = 1;
}

message ReleaseReservationResponse {
  bool success = 1;
  string message = 2;
  InventoryReservation reservation = 3;
}

message UseReservationRequest {
  int32 reservation_id = 1;
}

message UseReservationResponse {
  bool success = 1;
  string message = 2;
  InventoryReservation reservation = 3;
}

message GetReservationsByOrderRequest {
  int32 order_id = 1;
}

message GetReservationsByOrderResponse {
  bool success = 1;
  string message = 2;
  repeated InventoryReservation reservations = 3;
}

message GetLockedReservationsByOrderRequest {
  int32 order_id = 1;
}

message GetLockedReservationsByOrderResponse {
  bool success = 1;
  string message = 2;
  repeated InventoryReservation reservations = 3;
}

message ReservationItem {
  int32 product_id = 1;
  int32 warehouse_id = 2;
  string quantity = 3;
}

message BatchCreateReservationsRequest {
  int32 order_id = 1;
  repeated ReservationItem items = 2;
  int32 created_by = 3;
}

message BatchCreateReservationsResponse {
  bool success = 1;
  string message = 2;
  repeated InventoryReservation reservations = 3;
}

message BatchLockReservationsRequest {
  repeated int32 reservation_ids = 1;
}

message BatchLockReservationsResponse {
  bool success = 1;
  string message = 2;
  repeated InventoryReservation reservations = 3;
}

message BatchReleaseReservationsRequest {
  repeated int32 reservation_ids = 1;
}

message BatchReleaseReservationsResponse {
  bool success = 1;
  string message = 2;
  repeated InventoryReservation reservations = 3;
}

// ===================== 财务分析服务 =====================
service FinancialAnalysisService {
  // 获取指标列表
  rpc GetIndicatorsList(GetFinancialIndicatorsListRequest) returns (GetFinancialIndicatorsListResponse);
  // 创建指标
  rpc CreateIndicator(CreateFinancialIndicatorRequest) returns (CreateFinancialIndicatorResponse);
  // 创建分析结果
  rpc CreateAnalysisResult(CreateAnalysisResultRequest) returns (CreateAnalysisResultResponse);
  // 获取趋势数据
  rpc GetTrends(GetTrendsRequest) returns (GetTrendsResponse);
}

message FinancialIndicator {
  int32 id = 1;
  string indicator_name = 2;
  string indicator_code = 3;
  string indicator_type = 4;
  string formula = 5;
  string unit = 6;
  string status = 7;
  string remark = 8;
  int64 created_at = 9;
  int64 updated_at = 10;
}

message GetFinancialIndicatorsListRequest {
  string indicator_type = 1;
  string status = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message GetFinancialIndicatorsListResponse {
  bool success = 1;
  string message = 2;
  repeated FinancialIndicator indicators = 3;
  int32 total = 4;
}

message CreateFinancialIndicatorRequest {
  string indicator_name = 1;
  string indicator_code = 2;
  string indicator_type = 3;
  string formula = 4;
  string unit = 5;
  string remark = 6;
}

message CreateFinancialIndicatorResponse {
  bool success = 1;
  string message = 2;
  FinancialIndicator indicator = 3;
}

message FinancialAnalysisResult {
  int32 id = 1;
  string analysis_type = 2;
  string period = 3;
  int32 indicator_id = 4;
  string indicator_value = 5;
  string target_value = 6;
  string variance = 7;
  string variance_rate = 8;
  string trend = 9;
  string analysis_date = 10;
  int32 created_by = 11;
  int64 created_at = 12;
}

message CreateAnalysisResultRequest {
  string analysis_type = 1;
  string period = 2;
  int32 indicator_id = 3;
  string indicator_value = 4;
  string target_value = 5;
}

message CreateAnalysisResultResponse {
  bool success = 1;
  string message = 2;
  FinancialAnalysisResult result = 3;
}

message GetTrendsRequest {
  int32 indicator_id = 1;
  int32 limit = 2;
}

message GetTrendsResponse {
  bool success = 1;
  string message = 2;
  repeated FinancialAnalysisResult results = 3;
}
