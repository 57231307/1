syntax = "proto3";

package bingxi;

// 用户服务定义
service UserService {
  // 获取用户信息
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  // 创建用户
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  // 更新用户
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  // 删除用户
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  // 列出用户
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
}

// 认证服务定义
service AuthService {
  // 用户登录
  rpc Login(LoginRequest) returns (LoginResponse);
  // 验证 Token
  rpc VerifyToken(VerifyTokenRequest) returns (VerifyTokenResponse);
}

// 基础消息类型
message User {
  int32 id = 1;
  string username = 2;
  string email = 3;
  string phone = 4;
  string role = 5;
  string status = 6;
  int64 created_at = 7;
  int64 updated_at = 8;
  int64 last_login_at = 9;
}

// 用户相关请求/响应
message GetUserRequest {
  int32 user_id = 1;
}

message GetUserResponse {
  bool success = 1;
  string message = 2;
  User user = 3;
}

message CreateUserRequest {
  string username = 1;
  string password = 2;
  string email = 3;
  string phone = 4;
  string role = 5;
}

message CreateUserResponse {
  bool success = 1;
  string message = 2;
  User user = 3;
}

message UpdateUserRequest {
  int32 user_id = 1;
  string email = 2;
  string phone = 3;
  string role = 4;
  string status = 5;
}

message UpdateUserResponse {
  bool success = 1;
  string message = 2;
  User user = 3;
}

message DeleteUserRequest {
  int32 user_id = 1;
}

message DeleteUserResponse {
  bool success = 1;
  string message = 2;
}

message ListUsersRequest {
  int32 page = 1;
  int32 page_size = 2;
  string status = 3;
  string role = 4;
}

message ListUsersResponse {
  bool success = 1;
  string message = 2;
  repeated User users = 3;
  int32 total = 4;
  int32 page = 5;
  int32 page_size = 6;
  int32 total_pages = 7;
}

// 认证相关请求/响应
message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  bool success = 1;
  string message = 2;
  string token = 3;
  User user = 4;
}

message VerifyTokenRequest {
  string token = 1;
}

message VerifyTokenResponse {
  bool success = 1;
  string message = 2;
  bool valid = 3;
  User user = 4;
}

// ===================== 采购合同服务 =====================
service PurchaseContractService {
  rpc ListContracts(ListPurchaseContractsRequest) returns (ListPurchaseContractsResponse);
  rpc GetContract(GetPurchaseContractRequest) returns (GetPurchaseContractResponse);
  rpc CreateContract(CreatePurchaseContractRequest) returns (CreatePurchaseContractResponse);
  rpc ApproveContract(ApprovePurchaseContractRequest) returns (ApprovePurchaseContractResponse);
  rpc ExecuteContract(ExecutePurchaseContractRequest) returns (ExecutePurchaseContractResponse);
  rpc CancelContract(CancelPurchaseContractRequest) returns (CancelPurchaseContractResponse);
}

message PurchaseContract {
  int32 id = 1;
  string contract_no = 2;
  string contract_name = 3;
  string contract_type = 4;
  int32 supplier_id = 5;
  string supplier_name = 6;
  string total_amount = 7;
  string signed_date = 8;
  string effective_date = 9;
  string expiry_date = 10;
  string payment_terms = 11;
  string payment_method = 12;
  string delivery_date = 13;
  string delivery_location = 14;
  string status = 15;
  int32 created_by = 16;
  int64 created_at = 17;
  int64 updated_at = 18;
}

message ListPurchaseContractsRequest {
  string keyword = 1;
  string status = 2;
  int32 supplier_id = 3;
  int32 page = 4;
  int32 page_size = 5;
}

message ListPurchaseContractsResponse {
  bool success = 1;
  string message = 2;
  repeated PurchaseContract contracts = 3;
  int32 total = 4;
}

message GetPurchaseContractRequest {
  int32 contract_id = 1;
}

message GetPurchaseContractResponse {
  bool success = 1;
  string message = 2;
  PurchaseContract contract = 3;
}

message CreatePurchaseContractRequest {
  string contract_no = 1;
  string contract_name = 2;
  int32 supplier_id = 3;
  string total_amount = 4;
  string payment_terms = 5;
  string delivery_date = 6;
  string remark = 7;
}

message CreatePurchaseContractResponse {
  bool success = 1;
  string message = 2;
  PurchaseContract contract = 3;
}

message ApprovePurchaseContractRequest {
  int32 contract_id = 1;
}

message ApprovePurchaseContractResponse {
  bool success = 1;
  string message = 2;
}

message ExecutePurchaseContractRequest {
  int32 contract_id = 1;
  string execution_type = 2;
  string execution_amount = 3;
  string related_bill_type = 4;
  int32 related_bill_id = 5;
  string remark = 6;
}

message ExecutePurchaseContractResponse {
  bool success = 1;
  string message = 2;
}

message CancelPurchaseContractRequest {
  int32 contract_id = 1;
  string reason = 2;
}

message CancelPurchaseContractResponse {
  bool success = 1;
  string message = 2;
}

