}

message GetSupplierScoreRequest {
  int32 supplier_id = 1;
}

message GetSupplierScoreResponse {
  bool success = 1;
  string message = 2;
  SupplierScore score = 3;
}

message ListRatingsRequest {}

message ListRatingsResponse {
  bool success = 1;
  string message = 2;
  repeated EvaluationIndicator ratings = 3;
}

message GetSupplierRankingsRequest {
  int32 limit = 1;
}

message GetSupplierRankingsResponse {
  bool success = 1;
  string message = 2;
  repeated SupplierScore rankings = 3;
}

message GetEvaluationRecordsRequest {
  int32 supplier_id = 1;
  string period = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message GetEvaluationRecordsResponse {
  bool success = 1;
  string message = 2;
  repeated SupplierEvaluationRecord records = 3;
}

message GetEvaluationRecordByIdRequest {
  int32 record_id = 1;
}

message GetEvaluationRecordByIdResponse {
  bool success = 1;
  string message = 2;
  SupplierEvaluationRecord record = 3;
}

// ===================== 五维查询服务 =====================
