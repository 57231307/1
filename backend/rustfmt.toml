# 冰溪 ERP 后端 rustfmt 配置
# 注意：以下 nightly-only 配置项（imports_layout / group_imports /
# format_code_in_doc_comments / format_strings / normalize_comments）
# 在 stable Rust 1.94.1 不可用（"unstable features are only available in
# nightly channel"警告），会导致 cargo fmt --check 在 stable 下失败。
# 留白使用 stable 1.94.1 默认行为。
edition = "2021"
max_width = 100
tab_spaces = 4
newline_style = "Unix"
use_small_heuristics = "Default"
reorder_imports = true
# 关闭 reorder_modules：CI 跑 rustfmt stable 1.94.1，按字母序重排 pub mod 触发了
# 大量顺序不一致的"假错误"（mod.rs 注释中说明的逻辑分组是手工排序，
# 按字母排序后会破坏业务阅读习惯）。改用 off 保留逻辑分组。
reorder_modules = false
use_field_init_shorthand = true
use_try_shorthand = true
