name: 秉羲ERP系统自动编译

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  RUST_VERSION: 1.88.0
  CARGO_TERM_COLOR: always

jobs:
  backend-build:
    name: 后端编译
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-backend-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-backend-

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev postgresql-client protobuf-compiler

      - name: 编译后端
        working-directory: backend
        run: |
          cargo build --release

      - name: 上传编译产物
        uses: actions/upload-artifact@v5
        with:
          name: backend-binary
          path: backend/target/release/bingxi-backend
          retention-days: 7

  frontend-build:
    name: 前端编译
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: 安装 Trunk
        run: |
          cargo install --locked trunk

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/target
          key: ${{ runner.os }}-cargo-frontend-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-frontend-

      - name: 编译前端
        working-directory: frontend
        run: |
          trunk build --release

      - name: 上传编译产物
        uses: actions/upload-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  create-release:
    name: 创建发布包
    needs: [backend-build, frontend-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 下载后端产物
        uses: actions/download-artifact@v5
        with:
          name: backend-binary
          path: release/backend

      - name: 下载前端产物
        uses: actions/download-artifact@v5
        with:
          name: frontend-dist
          path: release/frontend/dist

      - name: 复制配置文件
        run: |
          chmod +x release/backend/bingxi-backend
          cp backend/.env.example release/backend/.env.example
          cp -r deploy release/deploy
          cp -r backend/database release/database
          if [ -f "README.md" ]; then cp README.md release/README.md; fi

      - name: 创建版本号
        id: version
        run: |
          VERSION=$(date +%Y%m%d)-$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 创建发布包
        working-directory: release
        run: |
          zip -r ../bingxi-erp-${{ steps.version.outputs.version }}.zip .

      - name: 上传发布包
        uses: actions/upload-artifact@v5
        with:
          name: bingxi-erp-release-${{ steps.version.outputs.version }}
          path: bingxi-erp-${{ steps.version.outputs.version }}.zip
          retention-days: 30

  notify:
    name: 构建通知
    needs: [backend-build, frontend-build, create-release]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 构建状态
        run: |
          echo "后端编译状态: ${{ needs.backend-build.result }}"
          echo "前端编译状态: ${{ needs.frontend-build.result }}"
          echo "发布包创建状态: ${{ needs.create-release.result }}"
