name: Security Audit

on:
  schedule:
    - cron: '0 0 * * 0' # 每周日午夜运行一次
  push:
    paths:
      - '**/Cargo.lock'
      - '**/Cargo.toml'
  pull_request:
    paths:
      - '**/Cargo.lock'
      - '**/Cargo.toml'

jobs:
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        
      - name: Install cargo-audit
        run: cargo install cargo-audit
        
      - name: Run cargo-audit on backend
        run: cargo audit
        working-directory: ./backend
        
      - name: Run cargo-audit on frontend
        run: cargo audit
        working-directory: ./frontend
        
      # Optional: Add cargo-deny or other security tools here
