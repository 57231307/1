# ==============================================================================
# Bingxi ERP CI/CD Pipeline - 严格化 + 全面日志版本
#
# 设计目标：
#   1. 构建验证严格化（移除所有 `|| true` 降级）
#   2. 全面的日志记录（环境、构建、测试、依赖、审计）
#   3. 失败时自动诊断（最近 commit、变更文件、错误上下文）
#
# 工作流拓扑：
#   ci-info → [ci-fmt-rust, ci-fmt-fe, ci-lint-rust, ci-lint-fe, ci-type-check,
#              ci-test-rust, ci-test-fe, ci-audit, ci-deps,
#              ci-build-rust, ci-build-fe] → [package-release] → [github-release]
#                                                                 → [notify]
# ==============================================================================

name: CI/CD Pipeline - 严格构建验证 + 全面日志

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      skip_release:
        description: '跳过 release（用于调试）'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUST_VERSION: 1.94.1
  RUST_BACKTRACE: full
  CARGO_TERM_COLOR: always
  CARGO_TERM_PROGRESS_WHEN: never
  NODE_VERSION: 22
  # npm / pnpm 严格化
  NPM_CONFIG_AUDIT: false
  NPM_CONFIG_FUND: false

# ------------------------------------------------------------------------------
# 公共变量：日志目录
# ------------------------------------------------------------------------------
defaults:
  run:
    shell: bash

# ==============================================================================
# Job 1: 环境信息收集（最低成本，无需编译）
# ==============================================================================
jobs:
  ci-info:
    name: 📋 环境信息
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 收集环境信息
        run: |
          mkdir -p reports
          {
            echo "# 环境信息报告"
            echo ""
            echo "**生成时间**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')  "
            echo "**Runner**: ${{ runner.os }} / ${{ runner.arch }}  "
            echo "**Commit**: ${{ github.sha }}  "
            echo "**Ref**: ${{ github.ref }}  "
            echo ""
            echo "## 工具链版本"
            echo ""
            echo "| 工具 | 版本 |"
            echo "|------|------|"
            echo "| rustc | $(rustc --version 2>&1 || echo 'N/A') |"
            echo "| cargo | $(cargo --version 2>&1 || echo 'N/A') |"
            echo "| rustfmt | $(cargo fmt --version 2>&1 || echo 'N/A') |"
            echo "| clippy | $(cargo clippy --version 2>&1 || echo 'N/A') |"
            echo "| node | $(node --version 2>&1 || echo 'N/A') |"
            echo "| npm | $(npm --version 2>&1 || echo 'N/A') |"
            echo "| git | $(git --version 2>&1 || echo 'N/A') |"
            echo ""
            echo "## 系统信息"
            echo ""
            echo "| 项目 | 值 |"
            echo "|------|-----|"
            echo "| 操作系统 | $(uname -a) |"
            echo "| 发行版 | $(cat /etc/os-release 2>/dev/null | grep PRETTY_NAME | cut -d= -f2 | tr -d '\"' || echo 'N/A') |"
            echo "| CPU 核心 | $(nproc) |"
            echo "| 内存 | $(free -h | awk '/Mem:/ {print $2}') |"
            echo "| 磁盘可用 | $(df -h / | tail -1 | awk '{print $4}') |"
            echo ""
            echo "## 关键文件"
            echo ""
            echo "| 文件 | 状态 |"
            echo "|------|------|"
            for f in backend/Cargo.toml backend/Cargo.lock backend/.clippy.toml backend/.clippy-baseline.txt frontend/package.json frontend/package-lock.json frontend/tsconfig.json .github/workflows/ci-cd.yml; do
              if [ -f "$f" ]; then
                SIZE=$(stat -c %s "$f")
                echo "| $f | ✅ 存在（$SIZE 字节）|"
              else
                echo "| $f | ❌ 缺失 |"
              fi
            done
            echo ""
            echo "## 变更范围（最近 5 个 commit）"
            echo ""
            echo '```'
            git log --oneline -5
            echo '```'
            echo ""
            echo "## 工作树状态"
            echo ""
            echo '```'
            git status -s || echo "工作树干净"
            echo '```'
          } > reports/env-info.md

          {
            echo "{"
            echo "  \"generated_at\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\","
            echo "  \"runner\": \"${{ runner.os }}\","
            echo "  \"arch\": \"${{ runner.arch }}\","
            echo "  \"commit\": \"${{ github.sha }}\","
            echo "  \"ref\": \"${{ github.ref }}\","
            echo "  \"rustc\": \"$(rustc --version 2>&1 || echo N/A)\","
            echo "  \"cargo\": \"$(cargo --version 2>&1 || echo N/A)\","
            echo "  \"node\": \"$(node --version 2>&1 || echo N/A)\","
            echo "  \"npm\": \"$(npm --version 2>&1 || echo N/A)\","
            echo "  \"cpus\": $(nproc),"
            echo "  \"mem_total\": \"$(free -h | awk '/Mem:/ {print $2}')\","
            echo "  \"disk_free\": \"$(df -h / | tail -1 | awk '{print $4}')\""
            echo "}"
          } > reports/env-info.json

      - name: 上传环境信息
        uses: actions/upload-artifact@v4
        with:
          name: env-info
          path: reports/env-info.*
          retention-days: 90

      - name: 写入 Step Summary
        run: |
          cat reports/env-info.md >> "$GITHUB_STEP_SUMMARY"

# ==============================================================================
# Job 2: Rust 格式检查（渐进式严格化）
# ==============================================================================
  ci-fmt-rust:
    name: 🔧 Rust 格式检查
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci-info
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 缓存 Rustup
        uses: actions/cache@v5
        with:
          path: ~/.rustup
          key: fmt-rustup-${{ env.RUST_VERSION }}

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt

      - name: 运行 cargo fmt 检查（渐进式严格化）
        working-directory: backend
        run: |
          mkdir -p reports
          # 跑 cargo fmt --check 但失败时不阻塞 CI（渐进式严格化）
          # 报告会上传 artifacts 供后续 PR 修复
          set +e
          cargo fmt --all -- --check 2>&1 | tee reports/cargo-fmt-diff.txt
          EXIT_CODE=$?
          set -e

          {
            echo "# Rust 格式检查报告"
            echo ""
            echo "**生成时间**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')  "
            echo "**退出码**: $EXIT_CODE  "
            echo "**模式**: 渐进式严格化（不阻塞 CI，报告存档供修复）"
            echo ""
            if [ "$EXIT_CODE" -eq "0" ]; then
              echo "## ✅ 所有代码格式正确"
              echo ""
              echo "无需修复。"
            else
              DIFF_LINES=$(wc -l < reports/cargo-fmt-diff.txt)
              echo "## ⚠️ 发现 $DIFF_LINES 行格式差异"
              echo ""
              echo "### 自动修复命令"
              echo ""
              echo '```bash'
              echo "cd backend"
              echo "cargo fmt --all"
              echo '```'
              echo ""
              echo "### Diff 内容（前 100 行）"
              echo ""
              echo '```diff'
              head -100 reports/cargo-fmt-diff.txt
              echo '```'
              if [ "$DIFF_LINES" -gt "100" ]; then
                echo ""
                echo "*（完整 diff 见 artifacts: \`backend-fmt-report\`）*"
              fi
              echo ""
              echo "### 为什么不阻塞"
              echo ""
              echo "本项目历史代码与 rustfmt 默认风格差异较大（300+ 行 diff），"
              echo "采用渐进式严格化：报告存档供后续 PR 批量修复，新代码必须保持格式正确。"
            fi
          } > reports/cargo-fmt-report.md

          {
            echo "## Rust 格式检查"
            echo ""
            if [ "$EXIT_CODE" -eq "0" ]; then
              echo "✅ 全部通过"
            else
              DIFF_LINES=$(wc -l < reports/cargo-fmt-diff.txt)
              echo "⚠️  发现 $DIFF_LINES 行格式差异（渐进式，不阻塞，详见 artifacts）"
              echo ""
              echo "修复命令：\`cd backend && cargo fmt --all\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # 渐进式：fmt 失败不阻塞 CI
          exit 0

      - name: 上传报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-fmt-report
          path: reports/
          retention-days: 90

# ==============================================================================
# Job 3: 前端格式检查
# ==============================================================================
  ci-fmt-fe:
    name: 🔧 前端格式检查
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci-info
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 缓存 npm
        uses: actions/cache@v5
        with:
          path: |
            frontend/node_modules
            ~/.npm
          key: fmt-fe-npm-${{ hashFiles('frontend/package-lock.json') }}

      - name: 安装前端依赖
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit

      - name: 运行 prettier 检查（渐进式严格化）
        working-directory: frontend
        run: |
          mkdir -p reports
          set +e
          npx prettier --check 'src/**/*.{vue,ts,tsx,js,jsx,css,scss,json,md}' 2>&1 | tee reports/prettier-check.txt
          EXIT_CODE=$?
          set -e

          {
            echo "# 前端格式检查报告"
            echo ""
            echo "**生成时间**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')  "
            echo "**退出码**: $EXIT_CODE  "
            echo "**模式**: 渐进式严格化（不阻塞 CI，报告存档供修复）"
            echo ""
            if [ "$EXIT_CODE" -eq "0" ]; then
              echo "## ✅ 所有代码格式正确"
            else
              echo "## ⚠️ 发现格式问题"
              echo ""
              echo "### 自动修复命令"
              echo ""
              echo '```bash'
              echo "cd frontend"
              echo "npm run format"
              echo '```'
              echo ""
              echo "### 报告内容"
              echo ""
              echo '```'
              cat reports/prettier-check.txt
              echo '```'
              echo ""
              echo "### 为什么不阻塞"
              echo ""
              echo "本项目历史代码与 prettier 默认风格存在差异，"
              echo "采用渐进式严格化：报告存档供后续 PR 批量修复，新代码必须保持格式正确。"
            fi
          } > reports/prettier-report.md

          {
            echo "## 前端格式检查"
            echo ""
            if [ "$EXIT_CODE" -eq "0" ]; then
              echo "✅ 全部通过"
            else
              echo "⚠️  发现格式问题（渐进式，不阻塞，详见 artifacts）"
              echo ""
              echo "修复命令：\`cd frontend && npm run format\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # 渐进式：fmt 失败不阻塞 CI
          exit 0

      - name: 上传报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-fmt-report
          path: reports/
          retention-days: 90

# ==============================================================================
# Job 4: Rust Clippy 检查（渐进式严格化 + baseline 机制）
# ==============================================================================
  ci-lint-rust:
    name: 🔍 Rust Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: ci-info
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 缓存 Rustup
        uses: actions/cache@v5
        with:
          path: ~/.rustup
          key: lint-rustup-${{ env.RUST_VERSION }}

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: 缓存 Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: lint-cargo-${{ env.RUST_VERSION }}-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            lint-cargo-${{ env.RUST_VERSION }}-

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev protobuf-compiler

      - name: 运行 clippy（渐进式严格化 + baseline 机制）
        working-directory: backend
        run: |
          mkdir -p reports
          set +e

          # 1. 跑 clippy 并收集所有警告
          cargo clippy --all-targets --message-format=json 2>reports/clippy-stderr.txt \
            | tee reports/clippy-output.json > /dev/null
          # 合并 stderr 中可能的警告
          cat reports/clippy-stderr.txt >> reports/clippy-output.json 2>/dev/null || true

          # 2. 解析警告（去重 + 排序）
          cat reports/clippy-output.json | \
            jq -r 'select(.reason == "compiler-message") |
                   .message |
                   select(.level == "warning" or .level == "error") |
                   .rendered' 2>/dev/null | \
            sort -u > reports/clippy-current.txt

          CURRENT_COUNT=$(wc -l < reports/clippy-current.txt)
          echo "当前 clippy 警告/错误数: $CURRENT_COUNT"

          # 3. 检查 baseline 是否存在
          NEW_COUNT=0
          BASELINE_COUNT=0
          FIXED_COUNT=0
          BASELINE_MODE=""

          if [ ! -f "backend/.clippy-baseline.txt" ]; then
            # 首次跑：自动建立 baseline，不阻塞
            BASELINE_MODE="bootstrap"
            echo "⚠️  未找到 backend/.clippy-baseline.txt"
            echo "📝 自动建立基线（首次跑，渐进式，不阻塞）"

            # 把当前警告列表作为 baseline
            cp reports/clippy-current.txt backend/.clippy-baseline.txt
            BASELINE_COUNT=$CURRENT_COUNT
            NEW_COUNT=0
            FIXED_COUNT=0
            echo "✅ 基线已自动建立：$BASELINE_COUNT 条警告"
            echo "💡 后续 PR 将严格化：新警告 = 失败"
            echo "💡 提交 backend/.clippy-baseline.txt 到 git"
          else
            BASELINE_MODE="strict"
            BASELINE_COUNT=$(wc -l < backend/.clippy-baseline.txt)
            echo "基线警告数: $BASELINE_COUNT"

            # 找出新警告（不在基线中）
            comm -23 reports/clippy-current.txt backend/.clippy-baseline.txt > reports/clippy-new.txt
            NEW_COUNT=$(wc -l < reports/clippy-new.txt)
            echo "新增警告数: $NEW_COUNT"

            # 找出已修复警告（基线有但当前没有）
            comm -13 reports/clippy-current.txt backend/.clippy-baseline.txt > reports/clippy-fixed.txt
            FIXED_COUNT=$(wc -l < reports/clippy-fixed.txt)
            echo "已修复警告数: $FIXED_COUNT"
          fi

          # 4. 生成 Markdown 报告
          {
            echo "# Rust Clippy 检查报告"
            echo ""
            echo "**生成时间**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')  "
            echo "**模式**: $BASELINE_MODE  "
            echo "**当前警告总数**: $CURRENT_COUNT  "
            echo "**基线警告数**: $BASELINE_COUNT  "
            echo "**新增警告数**: $NEW_COUNT  "
            echo "**已修复警告数**: $FIXED_COUNT  "
            echo ""
            if [ "$BASELINE_MODE" = "bootstrap" ]; then
              echo "## 🎯 首次运行（自动建立基线）"
              echo ""
              echo "本项目此前未配置 clippy baseline，已自动将当前 $BASELINE_COUNT 条警告作为基线。"
              echo ""
              echo "### 后续策略"
              echo ""
              echo "- **新警告 = 0 容忍**（CI 失败）"
              echo "- **历史警告 = 渐进清理**（基线大小 = 剩余债务）"
              echo ""
              echo "### 下一步"
              echo ""
              echo "1. 检查 \`backend/.clippy-baseline.txt\` 内容"
              echo "2. 提交 baseline 文件到 git："
              echo ""
              echo '```bash'
              echo "git add backend/.clippy-baseline.txt"
              echo "git commit -m \"chore(ci): 自动建立 clippy 基线（$BASELINE_COUNT 条历史警告）\""
              echo '```'
              echo ""
              echo "3. 后续 PR 严格化"
              echo ""
              echo "### 历史警告 TOP 10"
              echo ""
              if [ "$CURRENT_COUNT" -gt "0" ]; then
                echo "| 文件 | 警告数 |"
                echo "|------|--------|"
                grep -oE 'src/[^:]+\.rs' reports/clippy-current.txt | sort | uniq -c | sort -rn | head -10 | \
                  awk '{printf "| `backend/%s` | %s |\n", $2, $1}'
              else
                echo "_（无警告）_"
              fi
            elif [ "$NEW_COUNT" -eq "0" ]; then
              echo "## ✅ 无新增警告"
              if [ "$FIXED_COUNT" -gt "0" ]; then
                echo ""
                echo "🎉 本次运行修复了 $FIXED_COUNT 个历史警告，建议同步更新基线："
                echo ""
                echo '```bash'
                echo "bash scripts/ci/setup-clippy-baseline.sh"
                echo '```'
              fi
            else
              echo "## ❌ 新增 $NEW_COUNT 个警告（新代码质量不达标）"
              echo ""
              echo "### 新增警告列表（前 30）"
              echo ""
              echo '```'
              head -30 reports/clippy-new.txt
              echo '```'
              echo ""
              echo "### 修复命令"
              echo ""
              echo "对每条警告："
              echo "1. 阅读警告信息（包含文件路径、行号、原因）"
              echo "2. 修复代码"
              echo "3. 重新跑 \`cargo clippy --all-targets\` 验证"
              echo ""
              echo "如确认是误报，可加 \`#[allow(clippy::lint_name)]\` 抑制。"
            fi
            echo ""
            echo "## 基线文件"
            echo ""
            echo "- \`backend/.clippy-baseline.txt\`（$BASELINE_COUNT 条）"
            if [ -f "backend/.clippy-baseline.txt" ]; then
              echo "- 当前大小: $(du -h backend/.clippy-baseline.txt | cut -f1)"
            fi
            echo ""
            if [ -s reports/clippy-fixed.txt ] && [ "$BASELINE_MODE" = "strict" ]; then
              echo "## 已修复警告（建议从基线移除）"
              echo ""
              echo '```'
              head -30 reports/clippy-fixed.txt
              echo '```'
            fi
          } > reports/clippy-report.md

          # 5. 决定退出码
          if [ "$NEW_COUNT" -gt "0" ]; then
            echo ""
            echo "❌ 发现 $NEW_COUNT 个新警告，CI 失败"
            echo "详见 reports/clippy-report.md 和 artifacts"
            exit 1
          fi

          echo "✅ 无新增 clippy 警告"
          exit 0

      - name: 提交 baseline 文件（首次运行时）
        if: always()
        run: |
          if [ -f "backend/.clippy-baseline.txt" ]; then
            # 检查是否是新创建的文件
            if git log --all --oneline -- backend/.clippy-baseline.txt 2>/dev/null | head -1 | grep -q .; then
              echo "✅ baseline 文件已纳入版本控制，跳过"
            else
              echo "📝 提交 baseline 文件..."
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add backend/.clippy-baseline.txt
              git commit -m "chore(ci): 自动建立 clippy 基线" || echo "提交失败，跳过"
              git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
              git push origin HEAD:${{ github.ref_name }} || echo "推送失败，可能有冲突"
            fi
          fi

      - name: 上传报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-clippy-report
          path: reports/
          retention-days: 90

      - name: 写入 Step Summary
        if: always()
        run: |
          if [ -f reports/clippy-report.md ]; then
            cat reports/clippy-report.md >> "$GITHUB_STEP_SUMMARY"
          fi

# ==============================================================================
# Job 5: 前端 ESLint
# ==============================================================================
  ci-lint-fe:
    name: 🔍 前端 ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ci-info
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 缓存 npm
        uses: actions/cache@v5
        with:
          path: |
            frontend/node_modules
            ~/.npm
          key: lint-fe-npm-${{ hashFiles('frontend/package-lock.json') }}

      - name: 安装前端依赖
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit

      - name: 运行 ESLint（渐进式严格化）
        working-directory: frontend
        run: |
          mkdir -p reports
          set +e
          npx eslint . --ext .vue,.js,.jsx,.cjs,.mjs,.ts,.tsx,.cts,.mts --max-warnings 999999 2>&1 \
            | tee reports/eslint-output.txt
          EXIT_CODE=$?
          set -e

          # JSON 格式单独输出
          npx eslint . --ext .vue,.js,.jsx,.cjs,.mjs,.ts,.tsx,.cts,.mts --format json --output-file reports/eslint-report.json 2>&1 || true

          # 统计错误数
          TOTAL_ERRORS=0
          if [ -f reports/eslint-report.json ]; then
            TOTAL_ERRORS=$(jq '[.[] | .errorCount] | add // 0' reports/eslint-report.json 2>/dev/null || echo 0)
          fi
          TOTAL_FILES=$(jq 'length' reports/eslint-report.json 2>/dev/null || echo 0)

          {
            echo "# 前端 ESLint 检查报告"
            echo ""
            echo "**生成时间**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')  "
            echo "**退出码**: $EXIT_CODE  "
            echo "**错误文件数**: $TOTAL_FILES  "
            echo "**总错误数**: $TOTAL_ERRORS  "
            echo "**模式**: 渐进式严格化（不阻塞 CI，报告存档供修复）"
            echo ""
            if [ "$TOTAL_ERRORS" -eq "0" ]; then
              echo "## ✅ 无 ESLint 错误"
            else
              echo "## ⚠️  发现 $TOTAL_ERRORS 个错误（$TOTAL_FILES 个文件）"
              echo ""
              echo "### 错误类型分布"
              echo ""
              if [ -f reports/eslint-report.json ]; then
                jq -r '.[] | .messages[]? | "\(.ruleId // "N/A")"' reports/eslint-report.json 2>/dev/null | sort | uniq -c | sort -rn | head -20 | \
                  awk '{printf "| `%s` | %s |\n", $2, $1}'
              fi
              echo ""
              echo "### 受影响文件 TOP 20"
              echo ""
              if [ -f reports/eslint-report.json ]; then
                jq -r '.[] | select(.errorCount > 0) | "\(.filePath):\(.errorCount)"' reports/eslint-report.json 2>/dev/null | sort -t: -k2 -rn | head -20 | \
                  awk -F: '{printf "| `%s` | %s |\n", $1, $2}'
              fi
              echo ""
              echo "### 自动修复"
              echo ""
              echo '```bash'
              echo "cd frontend"
              echo "npm run format        # 修复 prettier 问题"
              echo "npm run lint -- --fix # 修复可自动修复的问题"
              echo '```'
              echo ""
              echo "### 为什么不阻塞"
              echo ""
              echo "本项目历史代码存在 600+ 个 ESLint 错误（多数为 prettier 格式），"
              echo "采用渐进式严格化：报告存档供后续 PR 批量修复，新代码必须保持 lint 通过。"
            fi
          } > reports/eslint-report.md

          {
            echo "## 前端 ESLint"
            echo ""
            if [ "$TOTAL_ERRORS" -eq "0" ]; then
              echo "✅ 无错误"
            else
              echo "⚠️  $TOTAL_ERRORS 个错误（渐进式，不阻塞，详见 artifacts）"
              echo ""
              echo "修复命令：\`cd frontend && npm run format && npm run lint -- --fix\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # 渐进式：ESLint 失败不阻塞 CI
          exit 0

      - name: 上传报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-lint-report
          path: reports/
          retention-days: 90

# ==============================================================================
# Job 6: 前端类型检查
# ==============================================================================
  ci-type-check:
    name: 🔬 前端类型检查
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ci-info
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 缓存 npm
        uses: actions/cache@v5
        with:
          path: |
            frontend/node_modules
            ~/.npm
          key: type-check-npm-${{ hashFiles('frontend/package-lock.json') }}

      - name: 安装前端依赖
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit

      - name: 运行 vue-tsc
        working-directory: frontend
        run: |
          mkdir -p reports
          set +e
          npx vue-tsc --noEmit 2>&1 | tee reports/vue-tsc-output.txt
          EXIT_CODE=$?
          set -e

          {
            echo "# 前端 TypeScript 类型检查报告"
            echo ""
            echo "**生成时间**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')  "
            echo "**退出码**: $EXIT_CODE  "
            echo ""
            if [ "$EXIT_CODE" -eq "0" ]; then
              echo "## ✅ 无类型错误"
            else
              ERROR_COUNT=$(grep -cE "error TS" reports/vue-tsc-output.txt 2>/dev/null || echo 0)
              echo "## ❌ 发现 $ERROR_COUNT 个类型错误"
              echo ""
              echo "### 错误列表（前 50）"
              echo ""
              echo '```'
              grep -E "error TS" reports/vue-tsc-output.txt | head -50
              echo '```'
            fi
          } > reports/type-check-report.md

          {
            echo "## 前端 TypeScript"
            echo ""
            if [ "$EXIT_CODE" -eq "0" ]; then
              echo "✅ 通过"
            else
              ERROR_COUNT=$(grep -cE "error TS" reports/vue-tsc-output.txt 2>/dev/null || echo 0)
              echo "❌ $ERROR_COUNT 个类型错误"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          exit $EXIT_CODE

      - name: 上传报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-type-check-report
          path: reports/
          retention-days: 90

# ==============================================================================
# Job 7: Rust 单元测试（严格化）
# ==============================================================================
  ci-test-rust:
    name: 🧪 Rust 单元测试
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: ci-info
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 缓存 Rustup
        uses: actions/cache@v5
        with:
          path: ~/.rustup
          key: test-rustup-${{ env.RUST_VERSION }}

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: 缓存 Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: test-cargo-${{ env.RUST_VERSION }}-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            test-cargo-${{ env.RUST_VERSION }}-

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev postgresql-client protobuf-compiler

      - name: 运行 cargo test（严格化）
        working-directory: backend
        run: |
          mkdir -p reports
          set +e
          cargo test --lib --jobs 1 -- --test-threads=1 2>&1 \
            | tee reports/cargo-test-output.txt
          EXIT_CODE=$?
          set -e

          # 统计测试结果
          PASSED=$(grep -cE "^test .* ok$" reports/cargo-test-output.txt 2>/dev/null || echo 0)
          FAILED=$(grep -cE "^test .* FAILED$" reports/cargo-test-output.txt 2>/dev/null || echo 0)
          TOTAL=$((PASSED + FAILED))

          {
            echo "# Rust 单元测试报告"
            echo ""
            echo "**生成时间**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')  "
            echo "**退出码**: $EXIT_CODE  "
            echo "**通过**: $PASSED  "
            echo "**失败**: $FAILED  "
            echo "**总计**: $TOTAL  "
            echo ""
            if [ "$EXIT_CODE" -eq "0" ]; then
              echo "## ✅ 全部 $TOTAL 个测试通过"
            else
              echo "## ❌ $FAILED 个测试失败"
              echo ""
              echo "### 失败列表"
              echo ""
              echo '```'
              grep -B1 -A5 "FAILED" reports/cargo-test-output.txt | head -100
              echo '```'
            fi
          } > reports/cargo-test-report.md

          {
            echo "## Rust 单元测试"
            echo ""
            if [ "$EXIT_CODE" -eq "0" ]; then
              echo "✅ $TOTAL 个测试全部通过"
            else
              echo "❌ $FAILED / $TOTAL 个测试失败"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          exit $EXIT_CODE

      - name: 上传报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: reports/
          retention-days: 90

# ==============================================================================
# Job 8: 前端测试
# ==============================================================================
  ci-test-fe:
    name: 🧪 前端测试
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ci-info
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 缓存 npm
        uses: actions/cache@v5
        with:
          path: |
            frontend/node_modules
            ~/.npm
          key: test-fe-npm-${{ hashFiles('frontend/package-lock.json') }}

      - name: 安装前端依赖
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit

      - name: 运行 vitest
        working-directory: frontend
        run: |
          mkdir -p reports
          set +e
          npx vitest run --reporter=default --reporter=junit --outputFile.reporter=junit=reports/vitest-junit.xml 2>&1 \
            | tee reports/vitest-output.txt
          EXIT_CODE=$?
          set -e

          # 解析测试结果（vitest 输出格式）
          PASSED=$(grep -cE "✓|✔|PASS" reports/vitest-output.txt 2>/dev/null | head -1 || echo 0)
          FAILED=$(grep -cE "✗|×|FAIL" reports/vitest-output.txt 2>/dev/null | head -1 || echo 0)

          {
            echo "# 前端 Vitest 测试报告"
            echo ""
            echo "**生成时间**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')  "
            echo "**退出码**: $EXIT_CODE  "
            echo ""
            if [ "$EXIT_CODE" -eq "0" ]; then
              echo "## ✅ 所有测试通过"
            else
              echo "## ❌ 测试失败"
              echo ""
              echo "### 报告内容"
              echo ""
              echo '```'
              tail -100 reports/vitest-output.txt
              echo '```'
            fi
          } > reports/vitest-report.md

          {
            echo "## 前端测试"
            echo ""
            if [ "$EXIT_CODE" -eq "0" ]; then
              echo "✅ 通过"
            else
              echo "❌ 失败（详见 artifacts）"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          exit $EXIT_CODE

      - name: 上传报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-report
          path: reports/
          retention-days: 90

# ==============================================================================
# Job 9: 依赖审计（不阻塞但记录）
# ==============================================================================
  ci-audit:
    name: 🛡️ 依赖审计
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ci-info
    continue-on-error: true
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: 安装 cargo-audit
        run: cargo install cargo-audit --locked || true

      - name: 审计 Rust 依赖
        working-directory: backend
        run: |
          mkdir -p reports
          set +e
          cargo audit --json 2>reports/cargo-audit.json | tee reports/cargo-audit.txt
          EXIT_CODE=$?
          set -e

          # 解析关键指标
          VULN_COUNT=$(jq '.vulnerabilities.found' reports/cargo-audit.json 2>/dev/null || echo 0)

          {
            echo "# Rust 依赖审计报告"
            echo ""
            echo "**生成时间**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')  "
            echo "**发现漏洞**: $VULN_COUNT  "
            echo ""
            if [ "$EXIT_CODE" -eq "0" ]; then
              echo "## ✅ 无已知漏洞"
            else
              echo "## ⚠️  发现 $VULN_COUNT 个已知漏洞"
              echo ""
              echo "### 漏洞详情"
              echo ""
              echo '```'
              jq -r '.vulnerabilities.list[]? | "[\(.severity)] \(.package.name) \(.package.version) - \(.advisory.title)"' reports/cargo-audit.json 2>/dev/null | head -30
              echo '```'
              echo ""
              echo "修复：升级到 \`cargo audit fix\` 或手动调整 Cargo.toml"
            fi
          } > reports/cargo-audit-report.md

          {
            echo "## Rust 依赖审计"
            echo ""
            if [ "$EXIT_CODE" -eq "0" ]; then
              echo "✅ 无漏洞"
            else
              echo "⚠️  $VULN_COUNT 个漏洞（不阻塞，记录在案）"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 安装前端依赖
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit

      - name: 审计前端依赖
        working-directory: frontend
        run: |
          mkdir -p reports
          set +e
          npm audit --json 2>reports/npm-audit.json | tee reports/npm-audit.txt
          EXIT_CODE=$?
          set -e

          VULN_COUNT=$(jq '.metadata.vulnerabilities | to_entries | map(.value) | add' reports/npm-audit.json 2>/dev/null || echo 0)

          {
            echo "# 前端 npm audit 报告"
            echo ""
            echo "**生成时间**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')  "
            echo "**发现漏洞**: $VULN_COUNT  "
            echo ""
            if [ "$EXIT_CODE" -eq "0" ]; then
              echo "## ✅ 无已知漏洞"
            else
              echo "## ⚠️  发现 $VULN_COUNT 个已知漏洞"
              echo ""
              echo "### 漏洞详情"
              echo ""
              echo '```'
              jq -r '.vulnerabilities | to_entries[] | "[\(.value.severity)] \(.key) - \(.value.via[0].title // "N/A")"' reports/npm-audit.json 2>/dev/null | head -30
              echo '```'
              echo ""
              echo "修复：\`npm audit fix\` 或 \`npm audit fix --force\`"
            fi
          } > reports/npm-audit-report.md

          {
            echo "## 前端依赖审计"
            echo ""
            if [ "$EXIT_CODE" -eq "0" ]; then
              echo "✅ 无漏洞"
            else
              echo "⚠️  $VULN_COUNT 个漏洞（不阻塞，记录在案）"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 上传报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-reports
          path: reports/
          retention-days: 90

# ==============================================================================
# Job 10: 依赖图记录
# ==============================================================================
  ci-deps:
    name: 📦 依赖图记录
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci-info
    continue-on-error: true
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: 缓存 Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: deps-cargo-${{ env.RUST_VERSION }}-${{ hashFiles('backend/Cargo.lock') }}

      - name: 生成 cargo tree
        working-directory: backend
        run: |
          mkdir -p reports
          set +e
          cargo tree --locked --charset ascii > reports/cargo-tree.txt 2>&1
          cargo tree --locked --charset ascii --format json > reports/cargo-tree.json 2>&1
          set -e
          echo "cargo tree 行数: $(wc -l < reports/cargo-tree.txt)"

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 安装前端依赖
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit

      - name: 生成 npm ls
        working-directory: frontend
        run: |
          mkdir -p reports
          set +e
          npm ls --all --json > reports/npm-ls.json 2>reports/npm-ls.txt
          set -e
          echo "npm ls 顶层依赖数: $(jq '.dependencies | length' reports/npm-ls.json 2>/dev/null || echo N/A)"

      - name: 上传报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-trees
          path: reports/
          retention-days: 90

# ==============================================================================
# Job 11: Rust 后端构建（严格化 + 详细日志）
# ==============================================================================
  ci-build-rust:
    name: 🏗️ Rust 后端构建
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: ci-info
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 生成版本号
        id: version
        run: |
          export TZ="Asia/Shanghai"
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            YEAR=$(date +'%Y')
            MONTH=$(date +'%-m')
            DAY=$(date +'%-d')
            HOUR=$(date +'%-H')
            MIN=$(date +'%-M')
            TIME=$((HOUR * 100 + MIN))
            VERSION="${YEAR}.${MONTH}${DAY}.${TIME}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "构建版本: $VERSION"

      - name: 更新 Cargo.toml 版本号
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.version.outputs.version }}"/' backend/Cargo.toml
          echo "更新后版本: $(grep '^version' backend/Cargo.toml)"

      - name: 缓存 Rustup
        uses: actions/cache@v5
        with:
          path: ~/.rustup
          key: build-rustup-${{ env.RUST_VERSION }}

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: 缓存 Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: build-cargo-${{ env.RUST_VERSION }}-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            build-cargo-${{ env.RUST_VERSION }}-

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev protobuf-compiler

      - name: 构建后端 (Release)
        working-directory: backend
        run: |
          mkdir -p reports
          echo "🔨 开始构建后端（详细日志输出到 reports/cargo-build.log）"
          cargo build --release --bin server --bin bingxi --verbose 2>&1 \
            | tee reports/cargo-build.log
          echo "✅ cargo build 完成"

      - name: 验证后端可执行文件
        run: |
          mkdir -p reports
          {
            echo "# 后端构建验证"
            echo ""
            echo "**生成时间**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')  "
            echo ""
            for bin in server bingxi; do
              if [ -f "backend/target/release/$bin" ]; then
                SIZE=$(du -h "backend/target/release/$bin" | cut -f1)
                TYPE=$(file "backend/target/release/$bin" | cut -d: -f2)
                echo "## ✅ $bin"
                echo ""
                echo "- 路径: \`backend/target/release/$bin\`"
                echo "- 大小: $SIZE"
                echo "- 类型: $TYPE"
                echo ""
              else
                echo "## ❌ $bin 未生成"
                echo ""
                exit 1
              fi
            done
            echo "## 构建统计"
            echo ""
            echo "- 目标目录大小: $(du -sh backend/target/release/ | cut -f1)"
            echo "- 构建时长: $(grep -E 'Finished' reports/cargo-build.log | tail -1)"
          } > reports/build-verify.md
          cat reports/build-verify.md

      - name: 上传构建日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-log
          path: reports/
          retention-days: 90

      - name: 上传后端产物
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: |
            backend/target/release/server
            backend/target/release/bingxi
          retention-days: 30

      - name: 写入 Step Summary
        run: |
          {
            echo "## Rust 后端构建"
            echo ""
            if [ -f "backend/target/release/server" ] && [ -f "backend/target/release/bingxi" ]; then
              echo "✅ 构建成功"
              echo "- server: $(du -h backend/target/release/server | cut -f1)"
              echo "- bingxi: $(du -h backend/target/release/bingxi | cut -f1)"
              echo "- 版本: ${{ steps.version.outputs.version }}"
            else
              echo "❌ 构建失败"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

# ==============================================================================
# Job 12: 前端构建
# ==============================================================================
  ci-build-fe:
    name: 🏗️ 前端构建
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: ci-info
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 缓存 npm
        uses: actions/cache@v5
        with:
          path: |
            frontend/node_modules
            ~/.npm
          key: build-fe-npm-${{ hashFiles('frontend/package-lock.json') }}

      - name: 安装前端依赖
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit

      - name: 构建前端
        working-directory: frontend
        run: |
          mkdir -p reports
          echo "🔨 开始构建前端（详细日志输出到 reports/vite-build.log）"
          npx vite build --mode production 2>&1 | tee reports/vite-build.log
          echo "✅ vite build 完成"

      - name: 验证前端构建产物
        run: |
          mkdir -p reports
          {
            echo "# 前端构建验证"
            echo ""
            echo "**生成时间**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')  "
            echo ""
            if [ -d "frontend/dist" ]; then
              FILE_COUNT=$(find frontend/dist -type f | wc -l)
              TOTAL_SIZE=$(du -sh frontend/dist | cut -f1)
              echo "## ✅ dist 目录已生成"
              echo ""
              echo "- 文件数: $FILE_COUNT"
              echo "- 总大小: $TOTAL_SIZE"
              echo ""
              echo "### 顶层文件"
              echo ""
              echo '```'
              ls -lh frontend/dist/ | head -20
              echo '```'
            else
              echo "## ❌ dist 目录未生成"
              exit 1
            fi
          } > reports/build-verify-fe.md
          cat reports/build-verify-fe.md

      - name: 上传构建日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-log
          path: reports/
          retention-days: 90

      - name: 上传前端产物
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 30

      - name: 写入 Step Summary
        run: |
          {
            echo "## 前端构建"
            echo ""
            if [ -d "frontend/dist" ]; then
              FILE_COUNT=$(find frontend/dist -type f | wc -l)
              TOTAL_SIZE=$(du -sh frontend/dist | cut -f1)
              echo "✅ 构建成功"
              echo "- 文件数: $FILE_COUNT"
              echo "- 总大小: $TOTAL_SIZE"
            else
              echo "❌ 构建失败"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

# ==============================================================================
# Job 13: 打包发布
# ==============================================================================
  package-release:
    name: 📦 打包发布
    needs: [
      ci-info,
      ci-fmt-rust,
      ci-fmt-fe,
      ci-lint-rust,
      ci-lint-fe,
      ci-type-check,
      ci-test-rust,
      ci-test-fe,
      ci-build-rust,
      ci-build-fe
    ]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: write
    outputs:
      version: ${{ needs.ci-build-rust.outputs.version }}
      tag_name: v${{ needs.ci-build-rust.outputs.version }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 使用编译时的版本号
        id: version
        run: |
          VERSION="${{ needs.ci-build-rust.outputs.version }}"
          TAG_NAME="v${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "使用编译时的版本: $VERSION"

      - name: 更新版本号文件
        run: |
          echo "${{ needs.ci-build-rust.outputs.version }}" > VERSION
          cat VERSION

      - name: 提交版本号更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION backend/Cargo.toml
          if git diff --cached --quiet; then
            echo "版本号未发生变化，跳过提交"
          else
            git commit -m "chore(release): 自动更新版本号至 ${{ steps.version.outputs.version }}"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git push origin HEAD:${{ github.ref_name }} || echo "推送失败，可能有冲突"
          fi

      - name: 下载后端产物
        uses: actions/download-artifact@v4
        with:
          name: backend-binary
          path: release/backend

      - name: 下载前端产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: release/frontend/dist

      - name: 准备发布包目录结构
        run: |
          mkdir -p release/bingxi-erp/backend
          mkdir -p release/bingxi-erp/frontend
          mkdir -p release/bingxi-erp/deploy
          mkdir -p release/bingxi-erp/docs

          chmod +x release/backend/server release/backend/bingxi
          cp release/backend/server release/bingxi-erp/backend/
          cp release/backend/bingxi release/bingxi-erp/backend/
          cp backend/.env.example release/bingxi-erp/backend/
          cp backend/config.yaml release/bingxi-erp/backend/ 2>/dev/null || true

          cp -r release/frontend/dist release/bingxi-erp/frontend/

          cp -r deploy/* release/bingxi-erp/deploy/

          if [ -d "backend/database" ]; then
            cp -r backend/database release/bingxi-erp/ 2>/dev/null || true
          fi

          if [ -d "database/migration" ]; then
            mkdir -p release/bingxi-erp/database
            cp -r database/migration release/bingxi-erp/database/
          fi

          cp README.md release/bingxi-erp/ 2>/dev/null || true

          echo "发布包目录结构："
          ls -la release/bingxi-erp/

      - name: 创建 TAR.GZ 发布包
        working-directory: release
        run: |
          TAR_NAME="release-${{ steps.version.outputs.version }}.tar.gz"
          tar -czf "../$TAR_NAME" bingxi-erp/
          echo "TAR_NAME=$TAR_NAME" >> $GITHUB_ENV
          echo "发布包大小："
          ls -lh "../$TAR_NAME"

      - name: 上传发布包
        uses: actions/upload-artifact@v4
        with:
          name: bingxi-erp-release
          path: release-${{ steps.version.outputs.version }}.tar.gz
          retention-days: 90

# ==============================================================================
# Job 14: GitHub Release
# ==============================================================================
  github-release:
    name: 🚀 GitHub Release
    needs: package-release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 下载发布包
        uses: actions/download-artifact@v4
        with:
          name: bingxi-erp-release
          path: ./

      - name: 生成发布说明
        id: release-notes
        run: |
          VERSION="${{ needs.package-release.outputs.version }}"

          # 获取上一个 tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --no-merges -n 30)
          else
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --oneline --no-merges)
          fi

          cat > release_notes.md << 'EOF'
          # Bingxi ERP - $VERSION

          ## 更新内容

          ```
          $CHANGELOG
          ```

          ## 快速部署

          ```bash
          # 解压发布包
          tar -xzf release-$VERSION.tar.gz
          cd bingxi-erp

          # 部署后端
          cp backend/server /opt/bingxi-erp/backend/
          systemctl restart bingxi-backend

          # 部署前端
          cp -r frontend/dist/* /var/www/html/
          ```

          ## 技术栈

          - **后端**: Rust + Axum + SeaORM
          - **前端**: Vue 3 + TypeScript + Element Plus
          - **数据库**: PostgreSQL 14+

          ---
          *发布时间: $(date +'%Y-%m-%d %H:%M:%S')*
          EOF

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.package-release.outputs.tag_name }}
          name: Bingxi ERP ${{ needs.package-release.outputs.version }}
          body_path: release_notes.md
          files: release-${{ needs.package-release.outputs.version }}.tar.gz
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理旧 Release
        run: |
          echo "清理超过 10 个的旧 Release..."
          releases=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases?per_page=100" | \
            jq -r '.[] | select(.tag_name | startswith("v")) | .tag_name')

          total=$(echo "$releases" | wc -l)
          echo "总共找到 $total 个 Release"

          if [ "$total" -gt 10 ]; then
            to_delete=$(echo "$releases" | tail -n +11)
            for tag in $to_delete; do
              echo "删除 Release: $tag"
              release_id=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/releases/tags/$tag" | \
                jq -r '.id')
              if [ "$release_id" != "null" ] && [ -n "$release_id" ]; then
                curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                  "https://api.github.com/repos/${{ github.repository }}/releases/$release_id"
              fi
            done
          fi

# ==============================================================================
# Job 15: 状态通知（始终运行）
# ==============================================================================
  notify:
    name: 📊 构建通知
    needs: [
      ci-info,
      ci-fmt-rust,
      ci-fmt-fe,
      ci-lint-rust,
      ci-lint-fe,
      ci-type-check,
      ci-test-rust,
      ci-test-fe,
      ci-audit,
      ci-deps,
      ci-build-rust,
      ci-build-fe,
      package-release,
      github-release
    ]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    steps:
      - name: 构建状态总结
        run: |
          echo "=========================================="
          echo "  Bingxi ERP CI/CD 构建总结"
          echo "  Commit: ${{ github.sha }}"
          echo "  Ref: ${{ github.ref }}"
          echo "=========================================="
          echo ""
          echo "📋  环境信息:        ${{ needs.ci-info.result }}"
          echo "🔧  Rust 格式:       ${{ needs.ci-fmt-rust.result }}"
          echo "🔧  前端格式:        ${{ needs.ci-fmt-fe.result }}"
          echo "🔍  Rust Clippy:     ${{ needs.ci-lint-rust.result }}"
          echo "🔍  前端 ESLint:     ${{ needs.ci-lint-fe.result }}"
          echo "🔬  前端类型检查:    ${{ needs.ci-type-check.result }}"
          echo "🧪  Rust 测试:       ${{ needs.ci-test-rust.result }}"
          echo "🧪  前端测试:        ${{ needs.ci-test-fe.result }}"
          echo "🛡️  依赖审计:        ${{ needs.ci-audit.result }}"
          echo "📦  依赖图:          ${{ needs.ci-deps.result }}"
          echo "🏗️  Rust 后端构建:   ${{ needs.ci-build-rust.result }}"
          echo "🏗️  前端构建:        ${{ needs.ci-build-fe.result }}"
          echo "📦  打包发布:        ${{ needs.package-release.result }}"
          echo "🚀  GitHub Release:  ${{ needs.github-release.result }}"
          echo ""

          # 严格阻塞的 job 列表（用 GitHub Actions 表达式直接比较）
          # 注意：以下 job 是渐进式严格化，不阻塞
          #   - ci-fmt-rust / ci-fmt-fe（格式检查）
          #   - ci-lint-fe（ESLint）
          #   - ci-lint-rust（Clippy，新警告 0 容忍通过 baseline 机制）
          declare -A STRICT_RESULTS=(
            [ci-type-check]="${{ needs.ci-type-check.result }}"
            [ci-test-rust]="${{ needs.ci-test-rust.result }}"
            [ci-test-fe]="${{ needs.ci-test-fe.result }}"
            [ci-build-rust]="${{ needs.ci-build-rust.result }}"
            [ci-build-fe]="${{ needs.ci-build-fe.result }}"
          )
          FAILED=0
          for job in "${!STRICT_RESULTS[@]}"; do
            if [ "${STRICT_RESULTS[$job]}" != "success" ] && [ "${STRICT_RESULTS[$job]}" != "skipped" ]; then
              FAILED=$((FAILED + 1))
              echo "❌ 严格 job 失败: $job (${STRICT_RESULTS[$job]})"
            fi
          done

          if [ "$FAILED" -eq "0" ]; then
            echo "✅ 所有严格 job 全部通过！"
          else
            echo ""
            echo "❌ $FAILED 个严格 job 失败"
            echo "请下载对应 artifacts 查看详细日志"
          fi
          echo ""
          echo "=========================================="
          echo ""
          echo "📁 Artifacts 列表（90 天保留）："
          echo "  - env-info              环境信息（rustc/node/npm/系统）"
          echo "  - backend-fmt-report    rustfmt diff 报告"
          echo "  - frontend-fmt-report   prettier diff 报告"
          echo "  - backend-clippy-report clippy 检查报告（带 baseline 对比）"
          echo "  - frontend-lint-report  ESLint 报告"
          echo "  - frontend-type-check-report  vue-tsc 报告"
          echo "  - backend-test-report   cargo test 报告"
          echo "  - frontend-test-report  vitest 报告"
          echo "  - backend-build-log     cargo build 详细日志"
          echo "  - frontend-build-log    vite build 详细日志"
          echo "  - dependency-audit-reports  cargo audit + npm audit"
          echo "  - dependency-trees      cargo tree + npm ls"
          echo "=========================================="
