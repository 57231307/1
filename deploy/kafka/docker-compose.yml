version: "3.9"

# P9-7 Kafka 集成部署
# 包含：Kafka + Zookeeper + Kafka UI

services:
  # 1. Zookeeper（Kafka 依赖）
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: bx-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped
    networks:
      - bx-kafka

  # 2. Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: bx-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"      # PLAINTEXT
      - "29092:29092"    # PLAINTEXT_HOST
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # 双 listener：内部通信 + 外部访问
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    restart: unless-stopped
    networks:
      - bx-kafka

  # 3. Kafka UI（管理界面）
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: bx-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    restart: unless-stopped
    networks:
      - bx-kafka

  # 4. 主题初始化（自动创建 3 个核心 topic）
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: bx-kafka-init
    depends_on:
      - kafka
    command: |
      bash -c "
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic erp.sales.events --partitions 3 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic erp.purchase.events --partitions 3 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic erp.inventory.events --partitions 3 --replication-factor 1 &&
        echo 'P9-7 3 topics created: erp.sales.events, erp.purchase.events, erp.inventory.events'
      "
    networks:
      - bx-kafka

networks:
  bx-kafka:
    driver: bridge
