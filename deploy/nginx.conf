# P0-D15：upstream 配置通过 include 引入，支持蓝绿部署零停机切换
# 活跃实例配置文件：/etc/nginx/bingxi-upstream.active.conf
# 切换方式：ln -sf /etc/nginx/bingxi-upstream-{blue|green}.conf /etc/nginx/bingxi-upstream.active.conf && nginx -s reload
# 首次部署需建立 symlink：ln -sf /etc/nginx/bingxi-upstream-blue.conf /etc/nginx/bingxi-upstream.active.conf
include /etc/nginx/bingxi-upstream.active.conf;

server {
    listen 80;
    # 生产环境请替换为实际域名
    # server_name your-domain.com www.your-domain.com;
    server_name _;

    # 前端静态文件
    location / {
        root /opt/bingxi/frontend/dist;
        try_files $uri $uri/ /index.html;

        # 禁止缓存 HTML
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        }

        # 缓存静态资源 (js, css, images, fonts)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # 后端 API 代理（P0-D15：使用 upstream 块支持蓝绿切换）
    location /api/ {
        # 生产环境建议使用 HTTPS
        proxy_pass http://bingxi_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 错误页面
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

