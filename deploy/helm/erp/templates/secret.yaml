apiVersion: v1
kind: Secret
metadata:
  name: {{ include "erp.fullname" . }}-secret
  labels:
    {{- include "erp.labels" . | nindent 4 }}
type: Opaque
data:
  DATABASE_URL: {{ .Values.secret.DATABASE_URL | b64enc | quote }}
  REDIS_URL: {{ .Values.secret.REDIS_URL | b64enc | quote }}
  JWT_SECRET: {{ .Values.secret.JWT_SECRET | b64enc | quote }}
  ENCRYPTION_KEY: {{ .Values.secret.ENCRYPTION_KEY | b64enc | quote }}
