version: "3.9"

# P9-6 OpenTelemetry 一体化部署
# 包含：Jaeger（追踪）+ Prometheus（指标）+ Grafana（可视化）

services:
  # 1. Jaeger - 分布式追踪 UI（all-in-one 模式）
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: bx-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "14250:14250"   # gRPC
      - "14268:14268"   # HTTP collector
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - JAEGER_DISABLED=false
    restart: unless-stopped
    networks:
      - bx-otel

  # 2. OpenTelemetry Collector（生产环境推荐）
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.99.0
    container_name: bx-otel-collector
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "8888:8888"     # Prometheus metrics
    environment:
      - ENV=dev
    restart: unless-stopped
    networks:
      - bx-otel
    profiles: ["prod"]

  # 3. Prometheus - 指标采集
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: bx-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    restart: unless-stopped
    networks:
      - bx-otel

  # 4. Grafana - 可视化
  grafana:
    image: grafana/grafana:10.4.0
    container_name: bx-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped
    networks:
      - bx-otel
    depends_on:
      - prometheus

  # 5. 后端服务（开发模式）
  backend:
    build: ../../backend
    container_name: bx-backend
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=bingxi-backend
    networks:
      - bx-otel
    depends_on:
      - jaeger
    profiles: ["dev"]

volumes:
  grafana_data:

networks:
  bx-otel:
    driver: bridge
