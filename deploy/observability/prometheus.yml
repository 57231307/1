global:
  scrape_interval: 15s
  evaluation_interval: 15s

# P9-6 OpenTelemetry Prometheus 采集配置

scrape_configs:
  # 后端应用指标
  - job_name: "bingxi-backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8080"]
        labels:
          service: bingxi-backend
          env: dev

  # Prometheus 自监控
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # OTel Collector 指标
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]
