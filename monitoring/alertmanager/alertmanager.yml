# ========================================
# 短信通知配置（需要第三方服务）：
# 
# 可使用以下服务：
# - 阿里云短信
# - 腾讯云短信
# - 华为云短信
# 
# 配置示例（以阿里云为例）：
# receivers:
#   - name: 'sms-alerts'
#     webhook_configs:
#       - url: 'https://dysmsapi.aliyuncs.com/'
#         send_resolved: true
# ========================================

# ========================================
# 使用说明：
# 
# 1. 修改 global 中的 SMTP 配置
# 2. 配置接收者邮箱地址
# 3. 根据需要配置 webhook（企业微信/钉钉）
# 4. 调整路由规则
# 5. 重启 Alertmanager
# 
# 启动 Alertmanager:
# alertmanager --config.file=alertmanager.yml
# 
# 访问 Alertmanager:
# http://localhost:9093
# ========================================
