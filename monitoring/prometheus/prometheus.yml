# Prometheus 配置文件
# 用于收集秉羲 ERP 系统的各项指标

global:
  scrape_interval: 15s      # 默认抓取间隔
  evaluation_interval: 15s  # 规则评估间隔
  external_labels:
    monitor: 'bingxi-erp'
    environment: 'production'

# 告警规则
rule_files:
  - "alert_rules.yml"

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# 抓取配置
scrape_configs:
  # Prometheus 自监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'

  # 后端应用指标
  - job_name: 'bingxi-backend'
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          instance: 'backend-server'
    metrics_path: '/metrics'
    
  # Node Exporter - 系统指标
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node_exporter:9100']
        labels:
          instance: 'server-node'
          
  # PostgreSQL 数据库指标（可选）
  - job_name: 'postgresql'
    static_configs:
      - targets: ['host.docker.internal:9187']
        labels:
          instance: 'postgres-db'
    # 需要安装 postgres_exporter
    # https://github.com/prometheus-community/postgres_exporter

# ========================================
# 使用说明：
# 
# 1. 后端应用需要在启动时添加监控路由
#    监听 8080 端口，路径：/metrics
#
# 2. 如果要监控 PostgreSQL，需要：
#    - 安装 postgres_exporter
#    - 配置 DATABASE_URL 环境变量
#
# 3. Docker 环境访问宿主机：
#    使用 host.docker.internal（Docker Desktop）
#    或使用 host 网络模式
#
# ========================================
