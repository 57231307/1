version: '3.8'

# P0-5 面料多色号定价扩展 - TEST 测试版本
# 启动：docker-compose up -d
# 停止：docker-compose down

services:
  postgres:
    image: postgres:15-alpine
    container_name: bingxi-pg-p0-5
    environment:
      POSTGRES_DB: bingxi
      POSTGRES_USER: bingxi
      POSTGRES_PASSWORD: bingxi_p0_5_test
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bingxi"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../..
      dockerfile: dist/test-version-P0-5/Dockerfile
    container_name: bingxi-backend-p0-5
    environment:
      DATABASE_URL: postgres://bingxi:bingxi_p0_5_test@postgres:5432/bingxi
      RUST_LOG: info
      BIND_ADDR: 0.0.0.0:8081
      JWT_SECRET: bingxi-p0-5-test-secret
      TENANT_MODE: multi
      PRICE_APPROVAL_THRESHOLD: "0.10"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"
    volumes:
      - ./config:/app/config:ro
    command: >
      sh -c "
        until pg_isready -h postgres -U bingxi; do sleep 2; done &&
        cd /app &&
        ./bingxi-backend
      "

  frontend:
    image: nginx:alpine
    container_name: bingxi-frontend-p0-5
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../frontend/dist:/usr/share/nginx/html:ro
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pg_data:
    name: bingxi-pg-data-p0-5
