version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: bingxi
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bingxi_test}
      POSTGRES_DB: bingxi_erp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bingxi"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: dist/test-version-P0-4/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://bingxi:${DB_PASSWORD:-bingxi_test}@postgres:5432/bingxi_erp
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-32bytes}
      RUST_LOG: info
    ports:
      - "8080:8080"

  frontend:
    image: nginx:alpine
    volumes:
      - ../../frontend/dist:/usr/share/nginx/html:ro
      - ../../deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
