# Docker Compose - P3-1 微服务编排
# 启动主项目（ERP 后端）+ notifications 微服务 + 共享 PostgreSQL

version: '3.8'

services:
  # 共享 PostgreSQL
  postgres:
    image: postgres:15
    container_name: erp-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=erp
      - POSTGRES_PASSWORD=erp
      - POSTGRES_MULTIPLE_DATABASES=erp,notifications_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 现有主项目（向后兼容，P0/P1/P2 已有功能）
  erp-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: erp-backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://erp:erp@postgres:5432/erp
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # P3-1 关键路径 demo：notifications 微服务
  notifications-service:
    build:
      context: ./notifications
      dockerfile: Dockerfile
    container_name: notifications-service
    ports:
      - "50056:50056"
    environment:
      - DATABASE_URL=postgres://erp:erp@postgres:5432/notifications_db
      - GRPC_PORT=50056
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
