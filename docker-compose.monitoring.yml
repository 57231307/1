version: '3.8'

# ========================================
# 秉羲 ERP 系统 - 监控栈部署配置
# 包含：Prometheus + Grafana + Node Exporter
# ========================================

services:
  # Prometheus - 指标收集和存储
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: bingxi_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - bingxi_monitoring
    labels:
      org.bingxi.service: prometheus

  # Grafana - 可视化面板
  grafana:
    image: grafana/grafana:10.0.0
    container_name: bingxi_grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=bingxi_admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_AUTH_ANONYMOUS_ENABLED=false
    ports:
      - "3000:3000"
    networks:
      - bingxi_monitoring
    depends_on:
      - prometheus
    labels:
      org.bingxi.service: grafana

  # Node Exporter - 系统指标收集
  node_exporter:
    image: quay.io/prometheus/node-exporter:v1.6.0
    container_name: bingxi_node_exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - bingxi_monitoring
    labels:
      org.bingxi.service: node_exporter

networks:
  bingxi_monitoring:
    driver: bridge
    name: bingxi_monitoring

volumes:
  prometheus_data:
    name: bingxi_prometheus_data
  grafana_data:
    name: bingxi_grafana_data

# ========================================
# 使用说明：
# 
# 1. 启动监控栈：
#    docker-compose -f docker-compose.monitoring.yml up -d
#
# 2. 访问 Prometheus：
#    http://localhost:9090
#
# 3. 访问 Grafana：
#    http://localhost:3000
#    用户名：admin
#    密码：bingxi_admin123
#
# 4. 停止监控栈：
#    docker-compose -f docker-compose.monitoring.yml down
#
# 5. 查看日志：
#    docker-compose -f docker-compose.monitoring.yml logs -f
#
# ========================================
